<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech For V I</title>

    <!-- ===== PDF.js ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js">
    </script>

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1e2a3a;
            --border: #d0d7e2;
            --accent: #0a6bff;
            --shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
            --radius: 14px;
            --font: 'Segoe UI', Roboto, system-ui, sans-serif;
            --transition: 0.3s ease;
        }

        body.dark {
            --bg: #12161c;
            --card: #1e2630;
            --text: #e8edf5;
            --border: #2f3a47;
            --accent: #4a9eff;
            --shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ===== TOP MENU BUTTON (top-left) ===== */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-btn:hover {
            transform: scale(1.05);
        }

        /* ===== DROPDOWN MENU ===== */
        .dropdown {
            position: fixed;
            top: 75px;
            left: 20px;
            z-index: 1001;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 10px 0;
            min-width: 200px;
            display: none;
            flex-direction: column;
        }

        .dropdown.open {
            display: flex;
        }

        .dropdown button {
            background: transparent;
            border: none;
            padding: 12px 24px;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: background 0.15s;
            width: 100%;
        }

        .dropdown button:hover,
        .dropdown button:focus-visible {
            background: var(--accent);
            color: #fff;
        }

        .dropdown button:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: -2px;
        }

        /* ===== MAIN INTERFACE ===== */
        #mainInterface {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            width: 100%;
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #mainInterface.hidden {
            display: none;
        }

        .main-title {
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), #6f42c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-sub {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-bottom: 40px;
            -webkit-text-fill-color: var(--text);
        }

        .join-main-btn {
            padding: 22px 60px;
            font-size: 2rem;
            font-weight: 700;
            border: none;
            border-radius: 80px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 12px 40px rgba(10, 107, 255, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .join-main-btn:hover {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 20px 50px rgba(10, 107, 255, 0.4);
        }

        /* ===== COMMUNITY SECTION ===== */
        #communitySection {
            display: none;
            width: 100%;
            max-width: 900px;
            animation: fadeSlide 0.6s ease;
        }

        #communitySection.visible {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-header {
            text-align: center;
            padding: 28px 20px 18px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .app-header h1 {
            font-size: clamp(26px, 5vw, 38px);
            font-weight: 700;
            color: var(--text);
        }

        #rules-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .rule-card {
            background: var(--card);
            border-left: 5px solid var(--accent);
            padding: 18px 22px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            font-size: clamp(17px, 1.3vw, 21px);
            line-height: 1.8;
            transition: transform 0.15s;
        }

        .rule-card:hover {
            transform: translateX(4px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        .controls button {
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            min-width: 160px;
        }

        .controls button:hover,
        .controls button:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: var(--accent) !important;
            color: #fff !important;
            border-color: var(--accent) !important;
        }

        .btn-primary:hover {
            background: #0055d4 !important;
        }

        /* ===== PDF READER OVERLAY ===== */
        #pdfReaderOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            padding: 40px 20px;
            overflow-y: auto;
            animation: fadeSlide 0.4s ease;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        #pdfReaderOverlay.open {
            display: flex;
        }

        .pdf-reader-box {
            background: var(--card);
            max-width: 800px;
            width: 100%;
            padding: 30px 28px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .pdf-reader-box h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .pdf-reader-box p {
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .pdf-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
        }

        .pdf-actions button {
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            min-width: 140px;
        }

        .pdf-actions button:hover:not(:disabled),
        .pdf-actions button:focus-visible:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .pdf-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pdf-actions .btn-accent {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .pdf-actions .btn-accent:hover:not(:disabled) {
            background: #0055d4;
        }

        .pdf-actions .btn-danger {
            background: #dc3545;
            color: #fff;
            border-color: #dc3545;
        }

        .pdf-actions .btn-danger:hover:not(:disabled) {
            background: #b02a37;
        }

        .pdf-status {
            margin-top: 16px;
            font-size: 1rem;
            opacity: 0.8;
            min-height: 2em;
        }

        .pdf-close-btn {
            margin-top: 30px;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid var(--border);
            border-radius: 60px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .pdf-close-btn:hover {
            background: var(--border);
        }

        /* ===== MODAL (Join Group) ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
            backdrop-filter: blur(4px);
        }

        .modal[aria-hidden="false"] {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            background: var(--card);
            max-width: 660px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px 28px;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .modal-content h2 {
            font-size: 26px;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .modal-content .subtitle {
            opacity: 0.8;
            margin-bottom: 24px;
        }

        .group-section {
            margin: 10px 0;
        }

        .group-section button {
            width: 100%;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            transition: all 0.2s;
            text-align: left;
            padding-left: 24px;
        }

        .group-section button:hover,
        .group-section button:focus-visible {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: scale(1.01);
        }

        .modal-close-btn {
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close-btn:hover,
        .modal-close-btn:focus-visible {
            background: var(--border);
            border-color: var(--accent);
        }

        /* ===== THEME TOGGLE (top-right) ===== */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 999;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 40px;
            padding: 20px 0 10px;
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            width: 100%;
        }

        /* ===== SCREEN READER ONLY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .join-main-btn {
                padding: 18px 40px;
                font-size: 1.6rem;
            }
            .controls {
                flex-direction: column;
                align-items: center;
            }
            .controls button {
                width: 100%;
                max-width: 320px;
            }
            .modal-content {
                padding: 22px 16px;
            }
            .rule-card {
                padding: 14px 16px;
                font-size: 16px;
            }
            .menu-btn {
                top: 10px;
                left: 10px;
                padding: 8px 14px;
                font-size: 1.2rem;
            }
            .theme-toggle {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 1rem;
            }
            .dropdown {
                top: 60px;
                left: 10px;
                min-width: 160px;
            }
            .pdf-reader-box {
                padding: 20px 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        :focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0055d4;
        }
    </style>
</head>
<body>

    <!-- ===== MAIN INTERFACE (join button) ===== -->
    <div id="mainInterface">

    <!-- ===== COMMUNITY SECTION ===== -->
    <div id="communitySection">

            <button class="modal-close-btn" id="closeModalBtn">Close Window</button>

    <script>

                    "قاعدہ 8: گروپ میں کوئی بھی ایپلیکیشن یا ویڈیو کا لنک تبھی شیئر کریں جب کسی رکن نے خاص طور پر اس کی درخواست کی ہو۔ بغیر مانگے لنکس شیئر کرنے سے گریز کریں۔",
                    "قاعدہ 9: کسی رکن کو ذاتی پیغام بھیجنا منع ہے۔ اگر آپ کسی سے رابطہ کرنا چاہتے ہیں تو پہلے گروپ میں اس کی رضامندی لیں۔ اگر آپ کسی یوزر کی پرسنل چیٹ پر بغیر اجازت رابطہ کریں گے اور اس یوزر نے ایڈمن کو کمپلین کی، تو آپ کو بغیر بتائے گروپ سے ریموو کر دیا جائے گا۔"
                ],
                hindi: [
                    "नियम 1: ग्रुप में शामिल होने के बाद 24 घंटों के भीतर अपना परिचय देना अनिवार्य है, जिसमें आपका पूरा नाम, देश, शहर और इस्तेमाल होने वाली डिवाइस शामिल हो। यदि आप कंप्यूटर का उपयोग करते हैं, तो अपने कंप्यूटर का नाम, विंडोज संस्करण और उपयोग किए जाने वाले स्क्रीन रीडर का उल्लेख करें।",
                    "नियम 2: कोई भी प्रश्न पूछने से पहले अपना नाम, डिवाइस का नाम और एंड्रॉइड संस्करण बताएं। यदि आपका प्रश्न कंप्यूटर के बारे में है, तो निर्माता, विंडोज संस्करण और कंप्यूटर पर उपयोग किए जा रहे स्क्रीन रीडर का उल्लेख करें।",
                    "नियम 3: अपना संदेश स्पष्ट रखें, स्क्रीन रीडर की आवाज़ कम रखें, पॉइंट-टू-पॉइंट बात करें और बातचीत को सख्ती से प्रश्न तक सीमित रखें। यदि आप किसी एप्लिकेशन का अनुरोध कर रहे हैं, तो अपने मोबाइल का नाम और एंड्रॉइड संस्करण प्रदान करना अनिवार्य है ताकि हम आपको उपयुक्त एप्लिकेशन भेज सकें। अनावश्यक चर्चा से बचें।",
                    "नियम 4: यदि आपको 24 घंटों के भीतर अपने प्रश्न या ऐप अनुरोध का उत्तर नहीं मिलता है, तो आप इस समय के बाद अपना संदेश दोबारा भेज सकते हैं। हालाँकि, यदि आप 24 घंटों के भीतर संदेश दोबारा भेजते हैं, तो आपको चेतावनी दी जाएगी, और यदि आप ऐसा करना जारी रखते हैं, तो आपको ग्रुप से निकाल दिया जाएगा।",
                    "नियम 5: एक-दूसरे के साथ सम्मान से पेश आएं, अनावश्यक बहस न करें, और जब किसी को उत्तर दें तो पहले उनका संदेश चुनें ताकि यह एक उत्तर के रूप में जाना जाए। धैर्य से बोलें और किसी भी प्रकार की अपमानजनक भाषा का प्रयोग करने से बचें।",
                    "नियम 6: एक बार जब आपको उत्तर मिल जाए, तो उस व्यक्ति के संदेश पर (thumbs up) या (red heart) के साथ प्रतिक्रिया करें; अलग से धन्यवाद या स्वागत कहने की आवश्यकता नहीं है।",
                    "नियम 7: ग्रुप में किसी भी प्रकार के लेख, सोशल मीडिया लिंक, इमोजी, ऑडियो, असंबंधित वीडियो या चित्र साझा करना सख्त मना है। यदि कोई भी इनमें से कोई भी वस्तु भेजता है, तो उसे बिना किसी सूचना के ग्रुप से हटा दिया जाएगा।",
                    "नियम 8: ग्रुप में एप्लिकेशन या वीडियो का लिंक तभी साझा करें जब किसी सदस्य ने विशेष रूप से इसका अनुरोध किया हो। बिना मांगे लिंक साझा करने से बचें।",
                    "नियम 9: किसी भी सदस्य को व्यक्तिगत संदेश भेजना मना है। यदि आप किसी से संपर्क करना चाहते हैं, तो पहले ग्रुप में उनकी सहमति लें। यदि आप बिना अनुमति के किसी उपयोगकर्ता को उनकी व्यक्तिगत चैट पर संपर्क करते हैं और वह उपयोगकर्ता एडमिन से शिकायत करता है, तो आपको बिना किसी सूचना के ग्रुप से हटा दिया जाएगा।"
                ]
            };

            const LANG_NAMES = ['english', 'urdu', 'hindi'];
            let currentLang = 'english';

            // ============================================================
            //  2. DOM REFERENCES
            // ============================================================
            const mainInterface = document.getElementById('mainInterface');
            const communitySection = document.getElementById('communitySection');
            const joinMainBtn = document.getElementById('joinMainBtn');
            const rulesContainer = document.getElementById('rules-container');
            const switchLangBtn = document.getElementById('switchLangBtn');
            const joinGroupBtn = document.getElementById('joinGroupBtn');
            const modal = document.getElementById('groupModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const announcer = document.getElementById('announcer');
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');

            // Menu & PDF
            const menuBtn = document.getElementById('menuBtn');
            const dropdownMenu = document.getElementById('dropdownMenu');
            const readPdfOption = document.getElementById('readPdfOption');
            const pdfOverlay = document.getElementById('pdfReaderOverlay');
            const choosePdfBtn = document.getElementById('choosePdfBtn');
            const pdfFileInput = document.getElementById('pdfFileInput');
            const readPdfBtn = document.getElementById('readPdfBtn');
            const stopPdfBtn = document.getElementById('stopPdfBtn');
            const pdfStatus = document.getElementById('pdfStatus');
            const closePdfBtn = document.getElementById('closePdfBtn');

            let isModalOpen = false;
            let pdfTextContent = '';
            let isReading = false;
            let speechUtterance = null;
            let currentPdfFileName = '';

            // ============================================================
            //  3. RENDER RULES
            // ============================================================
            function renderRules() {
                const rules = RULES[currentLang];
                if (!rules) return;
                const fragment = document.createDocumentFragment();
                rules.forEach(text => {
                    const card = document.createElement('div');
                    card.className = 'rule-card';
                    card.textContent = text;
                    fragment.appendChild(card);
                });
                rulesContainer.innerHTML = '';
                rulesContainer.appendChild(fragment);
            }

            // ============================================================
            //  4. LANGUAGE SWITCH
            // ============================================================
            function switchLanguage() {
                const idx = LANG_NAMES.indexOf(currentLang);
                const next = (idx + 1) % LANG_NAMES.length;
                currentLang = LANG_NAMES[next];
                renderRules();
                announcer.textContent = 'Language changed.';
            }

            // ============================================================
            //  5. MODAL (Join Group)
            // ============================================================
            function openModal() {
                if (isModalOpen) return;
                isModalOpen = true;
                modal.setAttribute('aria-hidden', 'false');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                const firstBtn = modal.querySelector('button');
                if (firstBtn) setTimeout(() => firstBtn.focus(), 50);
                announcer.textContent = 'Join group dialog opened.';
            }

            function closeModal() {
                if (!isModalOpen) return;
                isModalOpen = false;
                modal.setAttribute('aria-hidden', 'true');
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
                joinGroupBtn.focus();
                announcer.textContent = 'Dialog closed.';
            }

            function toggleModal() {
                isModalOpen ? closeModal() : openModal();
            }

            // ============================================================
            //  6. THEME TOGGLE
            // ============================================================
            function toggleTheme() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                themeIcon.textContent = isDark ? '☀️' : '🌙';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                announcer.textContent = isDark ? 'Dark theme enabled' : 'Light theme enabled';
            }

            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeIcon.textContent = '☀️';
            }

            // ============================================================
            //  7. SHOW COMMUNITY (main button)
            // ============================================================
            function showCommunity() {
                mainInterface.classList.add('hidden');
                communitySection.classList.add('visible');
                communitySection.style.display = 'block';
                renderRules();
                announcer.textContent = 'Community guidelines loaded.';
                const firstRule = document.querySelector('.rule-card');
                if (firstRule) firstRule.focus();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // ============================================================
            //  8. MENU DROPDOWN
            // ============================================================
            let isMenuOpen = false;

            function toggleMenu() {
                isMenuOpen = !isMenuOpen;
                dropdownMenu.classList.toggle('open', isMenuOpen);
                menuBtn.setAttribute('aria-expanded', isMenuOpen);
                if (isMenuOpen) {
                    const firstItem = dropdownMenu.querySelector('button');
                    if (firstItem) setTimeout(() => firstItem.focus(), 50);
                }
            }

            function closeMenu() {
                isMenuOpen = false;
                dropdownMenu.classList.remove('open');
                menuBtn.setAttribute('aria-expanded', 'false');
            }

            // ============================================================
            //  9. PDF READER
            // ============================================================
            function openPdfReader() {
                closeMenu();
                pdfOverlay.classList.add('open');
                pdfOverlay.style.display = 'flex';
                // Focus the choose button
                setTimeout(() => choosePdfBtn.focus(), 50);
                announcer.textContent = 'PDF Reader opened. Choose a PDF file.';
                // reset state
                pdfTextContent = '';
                currentPdfFileName = '';
                pdfStatus.textContent = 'No PDF loaded.';
                readPdfBtn.disabled = true;
                stopPdfBtn.disabled = true;
                readPdfBtn.textContent = '🔊 Read';
                stopPdfBtn.textContent = '⏹️ Stop';
                if (speechUtterance) {
                    window.speechSynthesis.cancel();
                    speechUtterance = null;
                    isReading = false;
                }
            }

            function closePdfReader() {
                // Stop any speech
                if (speechUtterance) {
                    window.speechSynthesis.cancel();
                    speechUtterance = null;
                    isReading = false;
                }
                pdfOverlay.classList.remove('open');
                pdfOverlay.style.display = 'none';
                announcer.textContent = 'PDF Reader closed.';
                // Return focus to menu button
                menuBtn.focus();
            }

            // Choose PDF file
            function choosePdf() {
                pdfFileInput.click();
            }

            // Handle file selection
            function handlePdfFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                currentPdfFileName = file.name;
                pdfStatus.textContent = `Loading "${file.name}" ...`;
                readPdfBtn.disabled = true;
                stopPdfBtn.disabled = true;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    // Use PDF.js to extract text
                    pdfjsLib.getDocument({ data: arrayBuffer }).promise
                        .then(function(pdf) {
                            let fullText = '';
                            const numPages = pdf.numPages;
                            const pagePromises = [];
                            for (let i = 1; i <= numPages; i++) {
                                pagePromises.push(pdf.getPage(i).then(function(page) {
                                    return page.getTextContent().then(function(textContent) {
                                        const pageText = textContent.items.map(item => item.str).join(' ');
                                        return pageText;
                                    });
                                }));
                            }
                            return Promise.all(pagePromises);
                        })
                        .then(function(pagesText) {
                            pdfTextContent = pagesText.join('\n\n');
                            if (pdfTextContent.trim().length === 0) {
                                pdfStatus.textContent = `⚠️ No readable text found in "${currentPdfFileName}".`;
                                readPdfBtn.disabled = true;
                                stopPdfBtn.disabled = true;
                            } else {
                                pdfStatus.textContent =
                                    `✅ Loaded "${currentPdfFileName}" (${pdfTextContent.split(/\s+/).length} words). Press Read to listen.`;
                                readPdfBtn.disabled = false;
                                stopPdfBtn.disabled = true; // stop only active after reading
                                announcer.textContent = 'PDF loaded successfully.';
                            }
                        })
                        .catch(function(err) {
                            console.error('PDF error:', err);
                            pdfStatus.textContent = `❌ Error reading PDF: ${err.message}`;
                            readPdfBtn.disabled = true;
                            stopPdfBtn.disabled = true;
                        });
                };
                reader.onerror = function() {
                    pdfStatus.textContent = '❌ Error reading file.';
                };
                reader.readAsArrayBuffer(file);
                // Reset input so same file can be re-selected
                pdfFileInput.value = '';
            }

            // Read PDF text
            function readPdf() {
                if (!pdfTextContent || pdfTextContent.trim().length === 0) {
                    pdfStatus.textContent = '⚠️ No text to read. Please load a PDF first.';
                    return;
                }
                if (isReading) {
                    // Already reading, do nothing (or toggle?)
                    return;
                }
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(pdfTextContent);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;

                utterance.onstart = function() {
                    isReading = true;
                    readPdfBtn.textContent = '⏹️ Stop';
                    readPdfBtn.disabled = false; // user can click to stop
                    stopPdfBtn.disabled = false;
                    pdfStatus.textContent = '🔊 Reading...';
                    announcer.textContent = 'Reading started.';
                };

                utterance.onend = function() {
                    isReading = false;
                    readPdfBtn.textContent = '🔊 Read';
                    readPdfBtn.disabled = false;
                    stopPdfBtn.disabled = true;
                    pdfStatus.textContent = '✅ Reading finished.';
                    announcer.textContent = 'Reading finished.';
                    speechUtterance = null;
                };

                utterance.onerror = function(event) {
                    if (event.error !== 'canceled') {
                        console.error('Speech error:', event.error);
                        pdfStatus.textContent = `⚠️ Speech error: ${event.error}`;
                    }
                    isReading = false;
                    readPdfBtn.textContent = '🔊 Read';
                    readPdfBtn.disabled = false;
                    stopPdfBtn.disabled = true;
                    speechUtterance = null;
                };

                speechUtterance = utterance;
                window.speechSynthesis.speak(utterance);
            }

            // Stop reading
            function stopReading() {
                if (speechUtterance) {
                    window.speechSynthesis.cancel();
                    speechUtterance = null;
                }
                isReading = false;
                readPdfBtn.textContent = '🔊 Read';
                readPdfBtn.disabled = false;
                stopPdfBtn.disabled = true;
                pdfStatus.textContent = '⏹️ Stopped.';
                announcer.textContent = 'Reading stopped.';
            }

            // ============================================================
            //  10. KEYBOARD TRAP FOR MODAL
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if (isModalOpen) {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        closeModal();
                        return;
                    }
                    if (e.key === 'Tab') {
                        const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                        if (focusable.length === 0) return;
                        const first = focusable[0];
                        const last = focusable[focusable.length - 1];
                        if (e.shiftKey && document.activeElement === first) {
                            e.preventDefault();
                            last.focus();
                        } else if (!e.shiftKey && document.activeElement === last) {
                            e.preventDefault();
                            first.focus();
                        }
                    }
                    return;
                }

                // PDF overlay keyboard trap
                if (pdfOverlay.classList.contains('open')) {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        closePdfReader();
                        return;
                    }
                    if (e.key === 'Tab') {
                        const focusable = pdfOverlay.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                        if (focusable.length === 0) return;
                        const first = focusable[0];
                        const last = focusable[focusable.length - 1];
                        if (e.shiftKey && document.activeElement === first) {
                            e.preventDefault();
                            last.focus();
                        } else if (!e.shiftKey && document.activeElement === last) {
                            e.preventDefault();
                            first.focus();
                        }
                    }
                }
            });

            // close modal on backdrop click
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });

            // close PDF overlay on backdrop click (but not on the box itself)
            pdfOverlay.addEventListener('click', function(e) {
                if (e.target === pdfOverlay) closePdfReader();
            });

            // ============================================================
            //  11. EVENT BINDING
            // ============================================================
            // Main join
            joinMainBtn.addEventListener('click', showCommunity);

            // Community controls
            switchLangBtn.addEventListener('click', switchLanguage);
            joinGroupBtn.addEventListener('click', toggleModal);
            closeModalBtn.addEventListener('click', closeModal);

            // Theme
            themeToggle.addEventListener('click', toggleTheme);

            // Menu
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMenu();
            });
            // Close menu when clicking outside
            document.addEventListener('click', function(e) {
                if (isMenuOpen && !dropdownMenu.contains(e.target) && e.target !== menuBtn) {
                    closeMenu();
                }
            });
            // Close menu on Escape
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isMenuOpen) {
                    closeMenu();
                    menuBtn.focus();
                }
            });

            // PDF option from menu
            readPdfOption.addEventListener('click', openPdfReader);

            // PDF controls
            choosePdfBtn.addEventListener('click', choosePdf);
            pdfFileInput.addEventListener('change', handlePdfFile);
            readPdfBtn.addEventListener('click', function() {
                if (isReading) {
                    // If currently reading, treat as stop
                    stopReading();
                } else {
                    readPdf();
                }
            });
            stopPdfBtn.addEventListener('click', stopReading);
            closePdfBtn.addEventListener('click', closePdfReader);

            // ============================================================
            //  12. INIT
            // ============================================================
            communitySection.style.display = 'none';
            renderRules();
            // Ensure PDF overlay is hidden initially
            pdfOverlay.style.display = 'none';
            pdfOverlay.classList.remove('open');

            console.log('🚀 Tech For V I — All features ready!');
        })();
    </script>
</body>
</html>
