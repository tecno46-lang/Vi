<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraLens by Tech for VI</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; background-color: #f9f9f9; }
        h1 { color: #333; }
        button { padding: 15px; margin: 10px 0; font-size: 16px; width: 100%; cursor: pointer; border: none; border-radius: 5px; background-color: #007bff; color: white; }
        button:active { background-color: #0056b3; }
        select, input[type="file"], input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        #apiKeySection { display: none; margin-top: 15px; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        #output { margin-top: 20px; border: 1px solid #ccc; padding: 15px; min-height: 100px; background-color: #fff; border-radius: 5px; }
        .label-text { font-weight: bold; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <h1>AuraLens by Tech for VI</h1>
    <p>Developer: Mohammad Hanzla</p>

    <button id="apiKeyBtn" aria-label="Enter API Key">Manage API Key</button>

    <div id="apiKeySection">
        <label for="apiKeyInput" class="label-text">Paste your API Key here:</label>
        <input type="text" id="apiKeyInput" placeholder="Enter your key...">
        <button id="saveApiKeyBtn" aria-label="Save API Key" style="background-color: #28a745;">Save API Key</button>
    </div>

    <hr>

    <label for="imageInput" class="label-text">Upload or take a picture:</label>
    <input type="file" id="imageInput" accept="image/*" capture="environment" aria-label="Upload an image">

    <label for="languageSelect" class="label-text">Select Output Language:</label>
    <select id="languageSelect">
        <option value="en-US">English</option>
        <option value="ur-PK">Urdu</option>
    </select>

    <label for="rateRange" class="label-text">Speech Rate:</label>
    <input type="range" id="rateRange" min="0.5" max="2" step="0.1" value="1">

    <button id="copyBtn" aria-label="Copy Result">Copy Result</button>
    <button id="stopBtn" aria-label="Stop Listening" style="background-color: #dc3545;">Stop Listening</button>

    <div id="output" aria-live="polite">
        Analysis results will appear here...
    </div>

    <script>
        const apiKeyBtn = document.getElementById('apiKeyBtn');
        const apiKeySection = document.getElementById('apiKeySection');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
        const imageInput = document.getElementById('imageInput');
        const outputDiv = document.getElementById('output');
        const stopBtn = document.getElementById('stopBtn');
        const copyBtn = document.getElementById('copyBtn');
        const languageSelect = document.getElementById('languageSelect');
        const rateRange = document.getElementById('rateRange');

        // Load saved API Key
        window.onload = () => {
            const savedKey = localStorage.getItem('auraLensApiKey');
            if (savedKey) apiKeyInput.value = savedKey;
        };

        apiKeyBtn.onclick = () => {
            apiKeySection.style.display = apiKeySection.style.display === 'none' ? 'block' : 'none';
        };

        saveApiKeyBtn.onclick = () => {
            localStorage.setItem('auraLensApiKey', apiKeyInput.value.trim());
            alert('API Key saved successfully!');
            apiKeySection.style.display = 'none';
        };

        imageInput.addEventListener('change', async (e) => {
            const key = localStorage.getItem('auraLensApiKey');
            if (!key) {
                alert('Please enter and save your API Key first.');
                return;
            }
            outputDiv.innerText = "Analyzing the image, please wait...";
            
            // Simulation logic
            setTimeout(() => {
                const description = "Image successfully processed. This is where your AI-generated description will appear.";
                outputDiv.innerText = description;
                speakText(description);
            }, 2000);
        });

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = languageSelect.value;
            utterance.rate = rateRange.value;
            window.speechSynthesis.speak(utterance);
        }

        stopBtn.onclick = () => window.speechSynthesis.cancel();
        
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(outputDiv.innerText);
            alert("Results copied to clipboard!");
        };
    </script>
</body>
</html>
