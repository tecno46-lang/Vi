<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Visual Assistant by Tech for VI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ----- RESET (برقرار) ----- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #0b0a12;
            --surface: #14121f;
            --card: #1c1a2e;
            --gold: #f6c96e;
            --gold-dim: #c9a04a;
            --text: #f2eee9;
            --text-secondary: #b8b0c4;
            --text-muted: #7a7290;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --transition: 0.2s ease;
        }
        html {
            font-size: 18px;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1.25rem 1rem 6rem;
            background-image: radial-gradient(ellipse at 50% 0%, #1f1a3a 0%, #0b0a12 70%);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 10px;
        }
        .app {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* ----- HEADER (دو لائنیں) ----- */
        .header {
            text-align: center;
            padding: 0.2rem 0 0.5rem;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f6c96e, #d4a03a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 0.15rem;
        }
        .header .dev-line {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .header .dev-line span {
            color: var(--gold-dim);
            font-weight: 600;
        }

        /* ----- SECTIONS ----- */
        .section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.2rem 1.2rem 1.4rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 215, 100, 0.06);
        }

        /* ----- BUTTONS ----- */
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.2rem;
        }
        .btn-row .btn {
            flex: 1;
            min-width: 100px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.7rem 1.2rem;
            border-radius: var(--radius-sm);
            border: none;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            touch-action: manipulation;
            user-select: none;
            white-space: nowrap;
            min-height: 48px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: linear-gradient(135deg, #f6c96e, #e0b04a);
            color: #0b0a12;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(246, 201, 110, 0.15);
        }
        .btn-primary:hover {
            box-shadow: 0 8px 28px rgba(246, 201, 110, 0.25);
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.97);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-outline {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn-outline:hover {
            border-color: var(--gold-dim);
            background: rgba(246, 201, 110, 0.05);
        }
        .btn-success {
            background: rgba(80, 200, 120, 0.12);
            color: #6fdf9a;
            border-color: rgba(80, 200, 120, 0.15);
        }
        .btn-success:hover {
            background: rgba(80, 200, 120, 0.2);
            border-color: rgba(80, 200, 120, 0.3);
        }
        .btn-danger {
            background: rgba(230, 80, 80, 0.1);
            color: #f58a8a;
            border-color: rgba(230, 80, 80, 0.15);
        }
        .btn-danger:hover {
            background: rgba(230, 80, 80, 0.2);
            border-color: rgba(230, 80, 80, 0.3);
        }
        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            min-height: 36px;
        }
        .btn-block {
            width: 100%;
        }

        .photo-row {
            display: flex;
            gap: 0.6rem;
        }
        .photo-row .btn {
            flex: 1;
        }

        /* ----- PREVIEW AREA ----- */
        .preview-area {
            margin-top: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-sm);
            padding: 0.5rem;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }
        .preview-area img,
        .preview-area video {
            max-height: 200px;
            max-width: 100%;
            border-radius: var(--radius-sm);
            object-fit: contain;
            background: rgba(0, 0, 0, 0.3);
        }
        .preview-area .placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .camera-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            z-index: 5;
        }
        .camera-overlay.show {
            display: flex;
        }
        .camera-overlay .sub {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        /* ----- RESULT ----- */
        .result-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--radius-sm);
            padding: 1rem 1.2rem;
            min-height: 80px;
            max-height: 280px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.04);
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 0.5rem;
        }
        .result-box .placeholder {
            color: var(--text-muted);
            font-style: italic;
        }
        .result-box .error {
            color: #f58a8a;
        }

        /* ----- STATUS ----- */
        .status {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            padding: 0.2rem 0;
            flex-wrap: wrap;
        }
        .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .status .dot.active {
            background: var(--gold);
            box-shadow: 0 0 12px rgba(246, 201, 110, 0.3);
        }
        .status .dot.speaking {
            background: #6fdf9a;
            box-shadow: 0 0 16px rgba(80, 200, 120, 0.4);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }
        .status .msg {
            flex: 1;
        }

        /* ----- SETTINGS OVERLAY (Accessible) ----- */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            z-index: 1000;
            animation: fadeIn 0.25s ease;
        }
        .settings-overlay.open {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .settings-panel {
            background: var(--card);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            padding: 2rem 1.8rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 215, 100, 0.08);
            max-height: 90vh;
            overflow-y: auto;
        }
        .settings-panel h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .settings-panel .field {
            margin-bottom: 1.2rem;
        }
        .settings-panel .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }
        .settings-panel .field select,
        .settings-panel .field input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            transition: border-color var(--transition);
        }
        .settings-panel .field select:focus,
        .settings-panel .field input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(246, 201, 110, 0.1);
        }
        .settings-panel .field select option {
            background: var(--surface);
        }
        .settings-panel .gemini-section .key-input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .settings-panel .gemini-section .key-input-group input {
            flex: 1;
        }
        .settings-panel .gemini-section .key-input-group .btn {
            flex-shrink: 0;
        }
        .settings-panel .gemini-section .key-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }
        .settings-panel .btn-back {
            margin-top: 1.5rem;
            width: 100%;
        }

        /* ----- FLOATING SPEECH BUTTON ----- */
        .fab-speech {
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            z-index: 500;
            border-radius: 60px;
            padding: 0.8rem 1.6rem;
            background: #dc3545;
            color: #fff;
            font-weight: 700;
            border: none;
            box-shadow: 0 8px 30px rgba(220, 53, 69, 0.4);
            font-family: var(--font);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: none;
            align-items: center;
            gap: 0.5rem;
            min-height: 56px;
            touch-action: manipulation;
        }
        .fab-speech:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(220, 53, 69, 0.5);
        }
        .fab-speech:active {
            transform: scale(0.95);
        }
        .fab-speech.show {
            display: flex;
        }
        .fab-speech .pulse-ring {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            animation: pulse-ring 1.2s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.3;
            }
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        /* ----- HIDDEN INPUTS ----- */
        .hidden-input {
            display: none;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 600px) {
            html {
                font-size: 16px;
            }
            .app {
                gap: 1rem;
            }
            .section {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .btn {
                font-size: 0.8rem;
                padding: 0.5rem 0.8rem;
                min-height: 42px;
            }
            .photo-row .btn {
                min-width: 80px;
            }
            .settings-panel {
                padding: 1.5rem 1rem;
            }
            .fab-speech {
                bottom: 1.2rem;
                right: 1rem;
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
                min-height: 48px;
            }
            .camera-overlay {
                font-size: 2rem;
            }
        }
        @media (max-width: 400px) {
            .btn-row .btn {
                min-width: 100%;
            }
            .photo-row .btn {
                min-width: 100%;
            }
        }

        .mt-1 {
            margin-top: 0.5rem;
        }
        .mt-2 {
            margin-top: 1rem;
        }
        .text-center {
            text-align: center;
        }
        .flex {
            display: flex;
            align-items: center;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .hidden {
            display: none !important;
        }
        .w-full {
            width: 100%;
        }
        .gap-1 {
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <!-- ===== MAIN APP ===== -->
    <div class="app" id="mainApp" role="main" aria-label="Visual Assistant by Tech for VI">

        <!-- HEADER -->
        <header class="header">
            <h1>Visual Assistant by Tech for VI</h1>
            <div class="dev-line">developed by <span>Mohammad Hanzala</span></div>
        </header>

        <!-- PHOTO BUTTONS -->
        <section class="section" aria-labelledby="photoSectionLabel">
            <h2 id="photoSectionLabel" class="hidden">Image input</h2>
            <div class="photo-row">
                <button class="btn btn-primary" id="takePhotoBtn" aria-label="Take a photo using camera">Take Photo</button>
                <button class="btn btn-primary" id="uploadPhotoBtn" aria-label="Upload a photo from device">Upload Photo</button>
            </div>
            <input type="file" id="uploadInput" class="hidden-input" accept="image/*" aria-hidden="true" />
            <div class="preview-area" id="previewArea" aria-live="polite" aria-atomic="true">
                <span class="placeholder" id="previewPlaceholder">No image selected</span>
                <img id="previewImg" class="hidden" alt="" />
                <video id="cameraPreview" autoplay playsinline class="hidden" aria-hidden="true"></video>
                <div class="camera-overlay" id="cameraOverlay" aria-hidden="true">
                    <span id="countdownNumber">3</span>
                    <span class="sub" id="countdownSub">Preparing...</span>
                </div>
            </div>
            <button class="btn btn-outline btn-block mt-1 hidden" id="cancelCameraBtn" aria-label="Cancel camera">Cancel</button>
        </section>

        <!-- RESULT & ACTIONS -->
        <section class="section" aria-labelledby="resultSectionLabel">
            <h2 id="resultSectionLabel" class="hidden">Analysis result</h2>
            <div class="status" role="status" aria-live="polite">
                <span class="dot" id="statusDot"></span>
                <span class="msg" id="statusMsg">Ready</span>
                <span id="charCount" style="font-size:0.7rem;color:var(--text-muted);"></span>
            </div>
            <div class="result-box" id="resultBox" role="region" aria-live="assertive" aria-atomic="true">
                <span class="placeholder">Image description will appear here.</span>
            </div>
            <div class="btn-row mt-2">
                <button class="btn btn-success" id="copyBtn" disabled aria-label="Copy result to clipboard">Copy Result</button>
                <button class="btn btn-danger" id="speechBtn" disabled aria-label="Stop or resume speech">Stop Speech</button>
                <button class="btn btn-outline" id="settingsBtn" aria-label="Open settings">Settings</button>
            </div>
        </section>

        <footer style="text-align:center;font-size:0.7rem;color:var(--text-muted);padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.04);">
            <span>Visual Assistant by Tech for VI</span>
        </footer>
    </div>

    <!-- ===== FLOATING SPEECH BUTTON ===== -->
    <button class="fab-speech" id="fabSpeechBtn" aria-label="Stop speech">
        <span class="pulse-ring"></span>
        Stop Speech
    </button>

    <!-- ===== SETTINGS OVERLAY ===== -->
    <div class="settings-overlay" id="settingsOverlay" role="dialog" aria-modal="true" aria-labelledby="settingsHeading">
        <div class="settings-panel">
            <h2 id="settingsHeading">Settings</h2>

            <div class="field">
                <label for="langSelect">Choose output language for feedback</label>
                <select id="langSelect"></select>
            </div>

            <div class="field">
                <label for="rateSelect">Choose speech rate for feedback</label>
                <select id="rateSelect">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2.0">2.0x</option>
                </select>
            </div>

            <div class="field gemini-section">
                <button class="btn btn-outline btn-block" id="toggleKeyBtn" aria-expanded="false">Enter your Gemini key</button>
                <div id="keyInputArea" class="hidden mt-1">
                    <div class="key-input-group">
                        <input type="text" id="geminiKeyInput" placeholder="Paste your API key" aria-label="Gemini API key" />
                        <button class="btn btn-primary btn-sm" id="saveKeyBtn">Save</button>
                    </div>
                    <div class="key-status" id="keyStatus" aria-live="polite">No key stored (demo mode)</div>
                </div>
            </div>

            <button class="btn btn-primary btn-block btn-back" id="goBackBtn">Go Back</button>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ======================== JAVASCRIPT ========================= -->
    <script>
        (function() {
            'use strict';

            // ----- DOM refs (تمام پہلے کی طرح) -----
            const takePhotoBtn = document.getElementById('takePhotoBtn');
            const uploadPhotoBtn = document.getElementById('uploadPhotoBtn');
            const uploadInput = document.getElementById('uploadInput');
            const previewImg = document.getElementById('previewImg');
            const previewPlaceholder = document.getElementById('previewPlaceholder');
            const cameraVideo = document.getElementById('cameraPreview');
            const cameraOverlay = document.getElementById('cameraOverlay');
            const countdownNumber = document.getElementById('countdownNumber');
            const countdownSub = document.getElementById('countdownSub');
            const cancelCameraBtn = document.getElementById('cancelCameraBtn');
            const resultBox = document.getElementById('resultBox');
            const statusDot = document.getElementById('statusDot');
            const statusMsg = document.getElementById('statusMsg');
            const charCount = document.getElementById('charCount');
            const copyBtn = document.getElementById('copyBtn');
            const speechBtn = document.getElementById('speechBtn');
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsOverlay = document.getElementById('settingsOverlay');
            const langSelect = document.getElementById('langSelect');
            const rateSelect = document.getElementById('rateSelect');
            const toggleKeyBtn = document.getElementById('toggleKeyBtn');
            const keyInputArea = document.getElementById('keyInputArea');
            const geminiKeyInput = document.getElementById('geminiKeyInput');
            const saveKeyBtn = document.getElementById('saveKeyBtn');
            const keyStatus = document.getElementById('keyStatus');
            const goBackBtn = document.getElementById('goBackBtn');
            const fabSpeechBtn = document.getElementById('fabSpeechBtn');
            const mainApp = document.getElementById('mainApp');

            // ----- State -----
            let apiKey = '';
            let isDemoMode = true;
            let currentImageData = null;
            let currentResult = '';
            let isAnalyzing = false;
            let isSpeaking = false;
            let currentUtterance = null;
            let selectedLang = 'en-US';
            let selectedRate = 1.0;
            let fallbackToDemo = false;
            let cameraStream = null;
            let cameraActive = false;
            let countdownTimer = null;

            // ----- Speech helpers (بہتر) -----
            function getVoices() {
                return window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
            }

            function speak(text, lang, rate, onEnd) {
                if (!text || text.trim().length === 0) return;
                if (!('speechSynthesis' in window)) {
                    console.warn('Speech synthesis not supported');
                    return;
                }
                // Cancel any ongoing speech
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                if (currentUtterance) currentUtterance = null;

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang || 'en-US';
                utterance.rate = rate || 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1;

                const voices = getVoices();
                if (voices.length > 0) {
                    const match = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
                    if (match) utterance.voice = match;
                }

                currentUtterance = utterance;
                isSpeaking = true;
                updateSpeechUI(true);
                speechBtn.textContent = 'Stop Speech';
                speechBtn.disabled = false;

                utterance.onstart = function() {
                    updateStatus('Speaking...', 'speaking');
                    updateSpeechUI(true);
                };
                utterance.onend = function() {
                    isSpeaking = false;
                    currentUtterance = null;
                    updateSpeechUI(false);
                    speechBtn.textContent = 'Respeak';
                    speechBtn.disabled = (currentResult === '');
                    updateStatus('Ready', 'idle');
                    if (onEnd) onEnd();
                };
                utterance.onerror = function(e) {
                    console.warn('TTS error:', e);
                    isSpeaking = false;
                    currentUtterance = null;
                    updateSpeechUI(false);
                    speechBtn.textContent = 'Respeak';
                    speechBtn.disabled = (currentResult === '');
                    updateStatus('Error', 'error');
                    // Don't show error for 'canceled'
                    if (e.error !== 'canceled') {
                        // Optionally show a toast
                    }
                };
                window.speechSynthesis.speak(utterance);
            }

            function speakFeedback(text) {
                speak(text, 'en-US', 1.0);
            }

            function speakResult(text) {
                if (!text) return;
                speak(text, selectedLang, selectedRate);
            }

            function stopSpeech() {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                if (currentUtterance) currentUtterance = null;
                isSpeaking = false;
                updateSpeechUI(false);
                speechBtn.textContent = 'Respeak';
                speechBtn.disabled = (currentResult === '');
                updateStatus('Stopped', 'idle');
            }

            function toggleSpeech() {
                if (isSpeaking) stopSpeech();
                else if (currentResult) speakResult(currentResult);
            }

            function updateSpeechUI(speaking) {
                if (speaking) {
                    fabSpeechBtn.classList.add('show');
                    fabSpeechBtn.innerHTML = '<span class="pulse-ring"></span> Stop Speech';
                } else {
                    fabSpeechBtn.classList.remove('show');
                }
            }

            // ----- UI helpers (برقرار) -----
            function updateStatus(text, state) {
                statusMsg.textContent = text;
                statusDot.className = 'dot';
                if (state === 'active') statusDot.classList.add('active');
                else if (state === 'speaking') statusDot.classList.add('speaking');
                else if (state === 'error') statusDot.style.background = '#f58a8a';
                else {
                    statusDot.style.background = '';
                    statusDot.className = 'dot';
                }
            }

            function setResultText(text, isError) {
                if (text) {
                    resultBox.innerHTML = text;
                    resultBox.className = 'result-box';
                    if (isError) resultBox.classList.add('error');
                    charCount.textContent = `${text.length} chars`;
                    currentResult = text;
                    copyBtn.disabled = false;
                    speechBtn.disabled = false;
                    speechBtn.textContent = 'Respeak';
                    if (isSpeaking) stopSpeech();
                } else {
                    resultBox.innerHTML = '<span class="placeholder">Image description will appear here.</span>';
                    resultBox.className = 'result-box';
                    charCount.textContent = '';
                    currentResult = '';
                    copyBtn.disabled = true;
                    speechBtn.disabled = true;
                    speechBtn.textContent = 'Stop Speech';
                    if (isSpeaking) stopSpeech();
                }
            }

            function showPreview(imageDataUrl) {
                if (imageDataUrl) {
                    previewImg.src = imageDataUrl;
                    previewImg.classList.remove('hidden');
                    previewPlaceholder.classList.add('hidden');
                    currentImageData = imageDataUrl;
                    cameraVideo.classList.add('hidden');
                    cameraVideo.pause();
                    cameraVideo.srcObject = null;
                    cameraActive = false;
                    cancelCameraBtn.classList.add('hidden');
                    cameraOverlay.classList.remove('show');
                } else {
                    previewImg.classList.add('hidden');
                    previewImg.src = '';
                    previewPlaceholder.classList.remove('hidden');
                    currentImageData = null;
                }
            }

            // ----- Camera logic (برقرار) -----
            async function startCamera() {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' },
                        audio: false });
                    cameraVideo.srcObject = cameraStream;
                    cameraVideo.classList.remove('hidden');
                    previewPlaceholder.classList.add('hidden');
                    previewImg.classList.add('hidden');
                    cameraActive = true;
                    cancelCameraBtn.classList.remove('hidden');
                    startCountdown();
                } catch (err) {
                    console.error('Camera error:', err);
                    speakFeedback('Camera access denied. Please use upload instead.');
                    uploadInput.click();
                }
            }

            function stopCamera() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(t => t.stop());
                    cameraStream = null;
                }
                cameraVideo.classList.add('hidden');
                cameraVideo.pause();
                cameraVideo.srcObject = null;
                cameraActive = false;
                cancelCameraBtn.classList.add('hidden');
                cameraOverlay.classList.remove('show');
                if (!currentImageData) {
                    previewPlaceholder.classList.remove('hidden');
                }
                clearTimeout(countdownTimer);
            }

            function startCountdown() {
                let count = 3;
                cameraOverlay.classList.add('show');
                countdownNumber.textContent = count;
                countdownSub.textContent = 'Hold your mobile steady...';
                speakFeedback('Please hold your mobile, taking picture in 3...');

                countdownTimer = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownNumber.textContent = count;
                        speakFeedback(count.toString());
                    } else if (count === 0) {
                        clearInterval(countdownTimer);
                        countdownNumber.textContent = '📸';
                        countdownSub.textContent = 'Capturing...';
                        captureImage();
                    }
                }, 1000);
            }

            function captureImage() {
                const canvas = document.createElement('canvas');
                canvas.width = cameraVideo.videoWidth;
                canvas.height = cameraVideo.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(cameraVideo, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg');
                stopCamera();
                showPreview(dataUrl);
                speakFeedback('Analysing, please wait.');
                setTimeout(() => analyzeImage(), 400);
            }

            // ----- File handling -----
            function handleFile(file) {
                if (!file || !file.type.startsWith('image/')) {
                    speakFeedback('Please select a valid image file.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    showPreview(dataUrl);
                    setResultText('');
                    updateStatus('Image loaded', 'idle');
                    speakFeedback('Image selected. Analysing...');
                    setTimeout(() => analyzeImage(), 400);
                };
                reader.readAsDataURL(file);
            }

            // ----- AI Analysis (بہتر quota handling) -----
            async function analyzeImage() {
                if (isAnalyzing) return;
                if (!currentImageData) {
                    speakFeedback('Please take or upload a photo first.');
                    return;
                }

                isAnalyzing = true;
                copyBtn.disabled = true;
                speechBtn.disabled = true;
                setResultText('Analysing...');
                updateStatus('Analysing...', 'active');

                try {
                    let description = '';
                    let usedDemo = false;

                    if (fallbackToDemo || isDemoMode || !apiKey) {
                        usedDemo = true;
                        description = await simulateAnalysis(currentImageData);
                        if (fallbackToDemo) {
                            description = '[Demo mode - quota exceeded] ' + description;
                            speakFeedback('API quota exceeded. Using demo mode.');
                            updateStatus('Demo mode (quota exceeded)', 'idle');
                        } else {
                            description = '[Demo mode] ' + description;
                        }
                    } else {
                        try {
                            description = await geminiAnalyze(currentImageData, apiKey);
                        } catch (err) {
                            const msg = err.message || '';
                            if (msg.includes('quota') || msg.includes('rate limit') || msg.includes('exceeded')) {
                                fallbackToDemo = true;
                                usedDemo = true;
                                description = '[Demo mode - quota exceeded] ' + await simulateAnalysis(currentImageData);
                                speakFeedback(
                                'API quota exceeded. Switching to demo mode. Please upgrade your key or use demo.');
                                updateStatus('Demo mode (quota exceeded)', 'idle');
                                setResultText('⚠️ API quota exceeded. Using demo mode. You can change your key in Settings.');
                            } else {
                                throw err;
                            }
                        }
                    }

                    setResultText(description);
                    updateStatus('Analysis complete', 'idle');
                    speakResult(description);
                    if (!usedDemo) {
                        speakFeedback('Analysis complete.');
                    }

                } catch (err) {
                    console.error(err);
                    const msg = err.message || 'Analysis failed.';
                    setResultText('Error: ' + msg, true);
                    updateStatus('Error', 'error');
                    speakFeedback('Analysis failed. Please try again or use demo mode.');
                } finally {
                    isAnalyzing = false;
                }
            }

            // ----- Gemini API (برقرار) -----
            async function geminiAnalyze(imageDataUrl, key) {
                const base64Data = imageDataUrl.split(',')[1];
                if (!base64Data) throw new Error('Invalid image data');
                const mimeType = imageDataUrl.split(';')[0].split(':')[1] || 'image/jpeg';
                const prompt = `You are an AI vision assistant. Provide a detailed, vivid, and comprehensive description of this image. Include:
        - Main subject and appearance
        - Colors, lighting, composition
        - Notable objects, people, actions
        - Mood or atmosphere
        - Any text or symbols visible
        - Overall context and setting
        Write in clear, natural language.`;
                const url =
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mimeType, data: base64Data } }
                        ] }],
                    generationConfig: { temperature: 0.4, maxOutputTokens: 800, topP: 0.9 }
                };
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    const errMsg = errData.error?.message || `HTTP ${response.status}`;
                    throw new Error(`Gemini error: ${errMsg}`);
                }
                const data = await response.json();
                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error('No description returned.');
                return text;
            }

            // ----- Demo simulation (برقرار) -----
            async function simulateAnalysis(imageDataUrl) {
                await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
                const templates = [
                    "A vibrant scene with rich colors and dynamic lighting. The composition draws the eye to the central subject, which appears to be the focal point. Warm tones dominate, creating an inviting atmosphere. The background is slightly blurred, adding depth. There's a sense of movement and life captured in this moment.",
                    "This image presents a serene and contemplative composition. Soft, muted colors blend harmoniously, evoking calm and introspection. The lighting is gentle, with subtle shadows that add dimension. The subject is positioned thoughtfully, creating a balanced narrative. The overall mood is peaceful.",
                    "A bold and striking image with strong contrasts and vivid hues. The composition is dynamic, with lines and shapes that guide the gaze across the frame. There's palpable energy — perhaps a moment of action frozen in time. Colors are saturated and confident, making a powerful statement.",
                    "An intimate close-up revealing textures and nuances often overlooked. Directional lighting creates interesting patterns of light and shadow, enhancing the three-dimensional feel. The color temperature leans warm, giving a cozy, approachable quality. Every element seems carefully considered.",
                    "A expansive scene with a clear sense of place. The composition uses the rule of thirds effectively, with interesting elements distributed throughout. Natural light plays a key role, casting gentle highlights and soft shadows. Colors are true to life, balanced and slightly poetic.",
                    "An abstract and artistic composition that prioritizes emotion over literal representation. Colors flow and blend in unexpected ways, creating a dreamlike quality. The texture is rich and varied, inviting closer inspection. This image feels like a visual poem — evocative and mysterious."
                ];
                const hash = simpleHash(imageDataUrl);
                const idx = Math.abs(hash) % templates.length;
                let desc = templates[idx];
                const variations = [
                    " The lighting suggests early morning or late afternoon, with long, soft shadows.",
                    " There's remarkable clarity, with sharp details in the foreground.",
                    " The color palette is particularly noteworthy, with unexpected accents that catch the eye.",
                    " The composition feels carefully balanced, each element contributing to the whole.",
                    " A subtle texture adds depth and tactile quality to the visual experience."
                ];
                const varIdx = Math.abs(hash >> 4) % variations.length;
                desc += variations[varIdx];
                const conclusions = [
                    " Overall, this is a compelling and well-crafted image that rewards careful observation.",
                    " It tells a story and invites the viewer to imagine the context behind it.",
                    " The image demonstrates a keen eye for composition and thoughtful visual storytelling.",
                    " There's a quiet confidence in this image — it knows what it wants to say."
                ];
                const conIdx = Math.abs(hash >> 8) % conclusions.length;
                desc += ' ' + conclusions[conIdx];
                return desc;
            }

            function simpleHash(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return hash;
            }

            // ----- Copy -----
            function copyResult() {
                if (!currentResult) {
                    speakFeedback('Nothing to copy. Please analyze an image first.');
                    return;
                }
                navigator.clipboard.writeText(currentResult).then(() => {
                    speakFeedback('Result successfully copied to clipboard.');
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = currentResult;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    speakFeedback('Result successfully copied to clipboard.');
                });
            }

            // ----- Settings (Accessible focus management) -----
            let previousFocus = null;

            function openSettings() {
                previousFocus = document.activeElement;
                settingsOverlay.classList.add('open');
                mainApp.setAttribute('aria-hidden', 'true');
                const firstFocusable = settingsOverlay.querySelector('select, button, input');
                if (firstFocusable) firstFocusable.focus();
                speakFeedback('Settings opened.');
            }

            function closeSettings() {
                settingsOverlay.classList.remove('open');
                mainApp.removeAttribute('aria-hidden');
                if (previousFocus && previousFocus.focus) {
                    previousFocus.focus();
                } else {
                    settingsBtn.focus();
                }
                speakFeedback('Settings closed.');
            }

            function populateLanguages() {
                const languages = [
                    { code: 'en-US', name: 'English (US)' },
                    { code: 'en-GB', name: 'English (UK)' },
                    { code: 'es-ES', name: 'Español' },
                    { code: 'fr-FR', name: 'Français' },
                    { code: 'de-DE', name: 'Deutsch' },
                    { code: 'it-IT', name: 'Italiano' },
                    { code: 'pt-BR', name: 'Português (BR)' },
                    { code: 'hi-IN', name: 'हिन्दी' },
                    { code: 'ur-PK', name: 'اردو' },
                    { code: 'ar-SA', name: 'العربية' },
                    { code: 'zh-CN', name: '中文' },
                    { code: 'ja-JP', name: '日本語' },
                    { code: 'ko-KR', name: '한국어' },
                    { code: 'ru-RU', name: 'Русский' },
                    { code: 'nl-NL', name: 'Nederlands' },
                    { code: 'pl-PL', name: 'Polski' },
                    { code: 'tr-TR', name: 'Türkçe' },
                    { code: 'sv-SE', name: 'Svenska' },
                    { code: 'da-DK', name: 'Dansk' },
                    { code: 'fi-FI', name: 'Suomi' },
                    { code: 'el-GR', name: 'Ελληνικά' },
                    { code: 'he-IL', name: 'עברית' },
                    { code: 'th-TH', name: 'ไทย' },
                    { code: 'vi-VN', name: 'Tiếng Việt' },
                    { code: 'id-ID', name: 'Bahasa Indonesia' },
                    { code: 'ms-MY', name: 'Bahasa Melayu' },
                    { code: 'fil-PH', name: 'Filipino' },
                    { code: 'sw-KE', name: 'Kiswahili' },
                    { code: 'zu-ZA', name: 'isiZulu' }
                ];
                languages.sort((a, b) => a.name.localeCompare(b.name));
                langSelect.innerHTML = '';
                languages.forEach(lang => {
                    const option = document.createElement('option');
                    option.value = lang.code;
                    option.textContent = lang.name;
                    langSelect.appendChild(option);
                });
                const savedLang = localStorage.getItem('auraLens_lang') || 'en-US';
                langSelect.value = savedLang;
                selectedLang = savedLang;
            }

            // ----- پہلے سے API key سیٹ کریں (آپ کی فراہم کردہ) -----
            const DEFAULT_API_KEY = 'AIzaSyCYmvKQbpG6OIt7oANe5G01FSRqLNNpsxM';

            function loadSettings() {
                const savedLang = localStorage.getItem('auraLens_lang');
                if (savedLang) { langSelect.value = savedLang;
                    selectedLang = savedLang; }
                const savedRate = localStorage.getItem('auraLens_rate');
                if (savedRate) { rateSelect.value = savedRate;
                    selectedRate = parseFloat(savedRate); }

                // Check if we have stored key
                let storedKey = localStorage.getItem('auraLens_apiKey');
                if (!storedKey) {
                    // If not stored, use the default key provided by user
                    storedKey = DEFAULT_API_KEY;
                    localStorage.setItem('auraLens_apiKey', storedKey);
                }
                if (storedKey) {
                    apiKey = storedKey;
                    isDemoMode = false;
                    fallbackToDemo = false;
                    keyStatus.textContent = '✅ API key stored.';
                    keyStatus.style.color = '#6fdf9a';
                    geminiKeyInput.value = storedKey;
                } else {
                    isDemoMode = true;
                    keyStatus.textContent = '⚪ No key stored (demo mode)';
                    keyStatus.style.color = '#7a7290';
                }
            }

            function saveSettings() {
                const lang = langSelect.value;
                const rate = parseFloat(rateSelect.value);
                localStorage.setItem('auraLens_lang', lang);
                localStorage.setItem('auraLens_rate', rate.toString());
                selectedLang = lang;
                selectedRate = rate;
                speakFeedback('Settings saved.');
            }

            function saveApiKey() {
                const key = geminiKeyInput.value.trim();
                if (!key) {
                    speakFeedback('Please enter a valid API key.');
                    return;
                }
                localStorage.setItem('auraLens_apiKey', key);
                apiKey = key;
                isDemoMode = false;
                fallbackToDemo = false;
                keyStatus.textContent = '✅ API key stored.';
                keyStatus.style.color = '#6fdf9a';
                keyInputArea.classList.add('hidden');
                toggleKeyBtn.textContent = 'Enter your Gemini key';
                toggleKeyBtn.setAttribute('aria-expanded', 'false');
                speakFeedback('API key saved successfully. You can now retry analysis.');
            }

            function toggleKeyInput() {
                const isHidden = keyInputArea.classList.contains('hidden');
                if (isHidden) {
                    keyInputArea.classList.remove('hidden');
                    toggleKeyBtn.textContent = 'Hide key input';
                    toggleKeyBtn.setAttribute('aria-expanded', 'true');
                    geminiKeyInput.focus();
                    if (apiKey) geminiKeyInput.value = apiKey;
                } else {
                    keyInputArea.classList.add('hidden');
                    toggleKeyBtn.textContent = 'Enter your Gemini key';
                    toggleKeyBtn.setAttribute('aria-expanded', 'false');
                }
            }

            // ----- Event listeners (سب پہلے کی طرح) -----
            takePhotoBtn.addEventListener('click', function() {
                if (cameraActive) return;
                stopSpeech();
                startCamera();
            });

            cancelCameraBtn.addEventListener('click', function() {
                stopCamera();
                speakFeedback('Camera cancelled.');
                if (!currentImageData) previewPlaceholder.classList.remove('hidden');
            });

            uploadPhotoBtn.addEventListener('click', function() {
                if (cameraActive) stopCamera();
                uploadInput.click();
            });

            uploadInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    handleFile(this.files[0]);
                    this.value = '';
                }
            });

            copyBtn.addEventListener('click', copyResult);
            speechBtn.addEventListener('click', toggleSpeech);
            fabSpeechBtn.addEventListener('click', toggleSpeech);

            settingsBtn.addEventListener('click', openSettings);
            goBackBtn.addEventListener('click', function() {
                saveSettings();
                closeSettings();
            });

            langSelect.addEventListener('change', function() {
                const lang = this.value;
                selectedLang = lang;
                localStorage.setItem('auraLens_lang', lang);
                speakFeedback('Language changed.');
            });

            rateSelect.addEventListener('change', function() {
                const rate = parseFloat(this.value);
                selectedRate = rate;
                localStorage.setItem('auraLens_rate', rate.toString());
                speakFeedback('Speech rate changed.');
            });

            toggleKeyBtn.addEventListener('click', toggleKeyInput);
            saveKeyBtn.addEventListener('click', saveApiKey);
            geminiKeyInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') saveApiKey();
            });

            settingsOverlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    saveSettings();
                    closeSettings();
                }
            });

            settingsOverlay.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    saveSettings();
                    closeSettings();
                    e.preventDefault();
                }
                if (e.key === 'Tab') {
                    const focusable = settingsOverlay.querySelectorAll('select, button, input, [tabindex="0"]');
                    if (focusable.length === 0) return;
                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];
                    if (e.shiftKey && document.activeElement === first) {
                        e.preventDefault();
                        last.focus();
                    } else if (!e.shiftKey && document.activeElement === last) {
                        e.preventDefault();
                        first.focus();
                    }
                }
            });

            // ----- Init -----
            function init() {
                populateLanguages();
                loadSettings();
                if (window.speechSynthesis) {
                    window.speechSynthesis.getVoices();
                    window.speechSynthesis.onvoiceschanged = function() { /* voices loaded */ };
                }
                updateStatus('Ready', 'idle');
                setResultText('');
                speechBtn.disabled = true;
                copyBtn.disabled = true;
                fabSpeechBtn.classList.remove('show');
                console.log('Visual Assistant initialized with default API key.');
                // Auto-save default key if not already stored? done in loadSettings
                // Now show a message that key is pre-configured.
                speakFeedback('Your API key is pre-configured. You can change it in settings.');
            }

            init();

            window.__auraLens = {
                analyzeImage,
                copyResult,
                toggleSpeech,
                stopSpeech,
                speakFeedback,
                speakResult,
                setResultText,
                currentResult: () => currentResult,
            };

        })();
    </script>

</body>
</html>
