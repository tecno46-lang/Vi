<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech For V I</title>
    <style>
        /* ===== CSS VARIABLES (Light / Dark) ===== */
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1e2a3a;
            --border: #d0d7e2;
            --accent: #0a6bff;
            --shadow: 0 6px 24px rgba(0,0,0,0.06);
            --radius: 14px;
            --font: 'Segoe UI', Roboto, system-ui, sans-serif;
            --transition: 0.3s ease;
        }

        body.dark {
            --bg: #12161c;
            --card: #1e2630;
            --text: #e8edf5;
            --border: #2f3a47;
            --accent: #4a9eff;
            --shadow: 0 6px 24px rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ===== MAIN INTERFACE (only join button) ===== */
        #mainInterface {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            width: 100%;
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #mainInterface.hidden {
            display: none;
        }

        .main-title {
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), #6f42c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-sub {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-bottom: 40px;
            -webkit-text-fill-color: var(--text);
        }

        .join-main-btn {
            padding: 22px 60px;
            font-size: 2rem;
            font-weight: 700;
            border: none;
            border-radius: 80px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 12px 40px rgba(10, 107, 255, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .join-main-btn:hover {
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 20px 50px rgba(10, 107, 255, 0.4);
        }

        .join-main-btn:focus-visible {
            outline: 4px solid var(--accent);
            outline-offset: 4px;
        }

        /* ===== THEME TOGGLE (floating) ===== */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 999;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* ===== COMMUNITY SECTION (hidden initially) ===== */
        #communitySection {
            display: none;
            width: 100%;
            max-width: 900px;
            animation: fadeSlide 0.6s ease;
        }

        #communitySection.visible {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER (inside community) ===== */
        .app-header {
            text-align: center;
            padding: 28px 20px 18px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .app-header h1 {
            font-size: clamp(26px, 5vw, 38px);
            font-weight: 700;
            color: var(--text);
        }

        /* ===== RULES ===== */
        #rules-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .rule-card {
            background: var(--card);
            border-left: 5px solid var(--accent);
            padding: 18px 22px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            font-size: clamp(17px, 1.3vw, 21px);
            line-height: 1.8;
            transition: transform 0.15s;
        }

        .rule-card:hover {
            transform: translateX(4px);
        }

        /* ===== BOTTOM CONTROLS (inside community) ===== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }

        .controls button {
            padding: 14px 32px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            min-width: 160px;
        }

        .controls button:hover,
        .controls button:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: var(--accent) !important;
            color: #fff !important;
            border-color: var(--accent) !important;
        }

        .btn-primary:hover {
            background: #0055d4 !important;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
            backdrop-filter: blur(4px);
        }

        .modal[aria-hidden="false"] {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            background: var(--card);
            max-width: 660px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px 28px;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }

        .modal-content h2 {
            font-size: 26px;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .modal-content .subtitle {
            opacity: 0.8;
            margin-bottom: 24px;
        }

        .group-section {
            margin: 10px 0;
        }

        .group-section button {
            width: 100%;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            transition: all 0.2s;
            text-align: left;
            padding-left: 24px;
        }

        .group-section button:hover,
        .group-section button:focus-visible {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: scale(1.01);
        }

        .modal-close-btn {
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close-btn:hover,
        .modal-close-btn:focus-visible {
            background: var(--border);
            border-color: var(--accent);
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 40px;
            padding: 20px 0 10px;
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            width: 100%;
        }

        /* ===== SCREEN READER ONLY ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            body { padding: 12px; }
            .join-main-btn { padding: 18px 40px; font-size: 1.6rem; }
            .controls { flex-direction: column; align-items: center; }
            .controls button { width: 100%; max-width: 320px; }
            .modal-content { padding: 22px 16px; }
            .rule-card { padding: 14px 16px; font-size: 16px; }
            .theme-toggle { top: 10px; right: 10px; padding: 6px 12px; font-size: 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        :focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>

                    "नियम 4: यदि आपको 24 घंटों के भीतर अपने प्रश्न या ऐप अनुरोध का उत्तर नहीं मिलता है, तो आप इस समय के बाद अपना संदेश दोबारा भेज सकते हैं। हालाँकि, यदि आप 24 घंटों के भीतर संदेश दोबारा भेजते हैं, तो आपको चेतावनी दी जाएगी, और यदि आप ऐसा करना जारी रखते हैं, तो आपको ग्रुप से निकाल दिया जाएगा।",
                    "नियम 5: एक-दूसरे के साथ सम्मान से पेश आएं, अनावश्यक बहस न करें, और जब किसी को उत्तर दें तो पहले उनका संदेश चुनें ताकि यह एक उत्तर के रूप में जाना जाए। धैर्य से बोलें और किसी भी प्रकार की अपमानजनक भाषा का प्रयोग करने से बचें।",
                    "नियम 6: एक बार जब आपको उत्तर मिल जाए, तो उस व्यक्ति के संदेश पर (thumbs up) या (red heart) के साथ प्रतिक्रिया करें; अलग से धन्यवाद या स्वागत कहने की आवश्यकता नहीं है।",
                    "नियम 7: ग्रुप में किसी भी प्रकार के लेख, सोशल मीडिया लिंक, इमोजी, ऑडियो, असंबंधित वीडियो या चित्र साझा करना सख्त मना है। यदि कोई भी इनमें से कोई भी वस्तु भेजता है, तो उसे बिना किसी सूचना के ग्रुप से हटा दिया जाएगा।",
                    "नियम 8: ग्रुप में एप्लिकेशन या वीडियो का लिंक तभी साझा करें जब किसी सदस्य ने विशेष रूप से इसका अनुरोध किया हो। बिना मांगे लिंक साझा करने से बचें।",
                    "नियम 9: किसी भी सदस्य को व्यक्तिगत संदेश भेजना मना है। यदि आप किसी से संपर्क करना चाहते हैं, तो पहले ग्रुप में उनकी सहमति लें। यदि आप बिना अनुमति के किसी उपयोगकर्ता को उनकी व्यक्तिगत चैट पर संपर्क करते हैं और वह उपयोगकर्ता एडमिन से शिकायत करता है, तो आपको बिना किसी सूचना के ग्रुप से हटा दिया जाएगा।"
                ]
            };

            const LANG_NAMES = ['english', 'urdu', 'hindi'];
            let currentLang = 'english';

            // DOM refs
            const mainInterface = document.getElementById('mainInterface');
            const communitySection = document.getElementById('communitySection');
            const joinMainBtn = document.getElementById('joinMainBtn');
            const rulesContainer = document.getElementById('rules-container');
            const switchLangBtn = document.getElementById('switchLangBtn');
            const joinGroupBtn = document.getElementById('joinGroupBtn');
            const modal = document.getElementById('groupModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const announcer = document.getElementById('announcer');
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');

            let isModalOpen = false;

            // =============================================
            // RENDER RULES
            // =============================================
            function renderRules() {
                const rules = RULES[currentLang];
                if (!rules) return;
                const fragment = document.createDocumentFragment();
                rules.forEach(text => {
                    const card = document.createElement('div');
                    card.className = 'rule-card';
                    card.textContent = text;
                    fragment.appendChild(card);
                });
                rulesContainer.innerHTML = '';
                rulesContainer.appendChild(fragment);
            }

            // =============================================
            // LANGUAGE SWITCH
            // =============================================
            function switchLanguage() {
                const idx = LANG_NAMES.indexOf(currentLang);
                const next = (idx + 1) % LANG_NAMES.length;
                currentLang = LANG_NAMES[next];
                renderRules();
                announcer.textContent = 'Language changed.';
            }

            // =============================================
            // MODAL
            // =============================================
            function openModal() {
                if (isModalOpen) return;
                isModalOpen = true;
                modal.setAttribute('aria-hidden', 'false');
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
                const firstBtn = modal.querySelector('button');
                if (firstBtn) setTimeout(() => firstBtn.focus(), 50);
                announcer.textContent = 'Join group dialog opened.';
            }

            function closeModal() {
                if (!isModalOpen) return;
                isModalOpen = false;
                modal.setAttribute('aria-hidden', 'true');
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
                joinGroupBtn.focus();
                announcer.textContent = 'Dialog closed.';
            }

            function toggleModal() {
                isModalOpen ? closeModal() : openModal();
            }

            // =============================================
            // THEME TOGGLE
            // =============================================
            function toggleTheme() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                themeIcon.textContent = isDark ? '☀️' : '🌙';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                announcer.textContent = isDark ? 'Dark theme enabled' : 'Light theme enabled';
            }

            // load saved theme
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeIcon.textContent = '☀️';
            }

            // =============================================
            // SHOW COMMUNITY (main button click)
            // =============================================
            function showCommunity() {
                mainInterface.classList.add('hidden');
                communitySection.classList.add('visible');
                communitySection.style.display = 'block';
                renderRules(); // ensure rules are rendered
                announcer.textContent = 'Community guidelines loaded.';
                // focus first rule for keyboard users
                const firstRule = document.querySelector('.rule-card');
                if (firstRule) firstRule.focus();
                // smooth scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // =============================================
            // KEYBOARD TRAP FOR MODAL
            // =============================================
            document.addEventListener('keydown', function(e) {
                if (!isModalOpen) return;
                if (e.key === 'Escape') {
                    e.preventDefault();
                    closeModal();
                    return;
                }
                if (e.key === 'Tab') {
                    const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                    if (focusable.length === 0) return;
                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];
                    if (e.shiftKey && document.activeElement === first) {
                        e.preventDefault();
                        last.focus();
                    } else if (!e.shiftKey && document.activeElement === last) {
                        e.preventDefault();
                        first.focus();
                    }
                }
            });

            // close modal on backdrop click
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });

            // =============================================
            // EVENT BINDING
            // =============================================
            joinMainBtn.addEventListener('click', showCommunity);
            switchLangBtn.addEventListener('click', switchLanguage);
            joinGroupBtn.addEventListener('click', toggleModal);
            closeModalBtn.addEventListener('click', closeModal);
            themeToggle.addEventListener('click', toggleTheme);

            // =============================================
            // INIT
            // =============================================
            // Initially community hidden
            communitySection.style.display = 'none';
            renderRules(); // pre-render so it's ready

            console.log('🚀 Tech For V I — Main Interface Ready');
        })();
    </script>
</body>
</html>
