<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech for VI - Visual Assistant (Standalone)</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@19/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone for JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons (for icons) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom styles and animations */
        body {
            background: #000;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
        }
        *:focus-visible {
            outline: 4px solid #facc15 !important;
            outline-offset: 3px !important;
        }
        @keyframes pulse-wave {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1.2); }
        }
        .sound-bar {
            animation: pulse-wave 1s ease-in-out infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- Babel will transpile the JSX code below -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================================
        //  APP COMPONENT
        // ============================================================
        function App() {
            // ---------- State ----------
            const [voices, setVoices] = useState([]);
            const [speechSpeed, setSpeechSpeed] = useState("1");
            const [targetLanguageCode, setTargetLanguageCode] = useState("ur");
            const [currentView, setCurrentView] = useState("main");
            const [aboutSubView, setAboutSubView] = useState("menu");
            const [appMode, setAppMode] = useState("normal");
            const [cashCountry, setCashCountry] = useState("Pakistan (PKR)");
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [countdown, setCountdown] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [errorStatus, setErrorStatus] = useState(null);
            const [currentResult, setCurrentResult] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [ariaLiveAnnouncement, setAriaLiveAnnouncement] = useState("System ready.");

            // Refs
            const videoRef = useRef(null);
            const fileInputRef = useRef(null);
            const streamRef = useRef(null);
            const countdownIntervalRef = useRef(null);

            // ---------- Constants ----------
            const LANGUAGES_SUPPORT = [
                { code: "ur", name: "Urdu (اردو)", label: "Urdu" },
                { code: "en", name: "English", label: "English" },
                { code: "hi", name: "Hindi (हिंदी)", label: "Hindi" },
                { code: "ar", name: "Arabic (العربية)", label: "Arabic" },
                { code: "es", name: "Spanish (Español)", label: "Spanish" },
                { code: "fr", name: "French (Français)", label: "French" },
                { code: "de", name: "German (Deutsch)", label: "German" },
                { code: "ja", name: "Japanese (日本語)", label: "Japanese" },
            ];

            const CASH_COUNTRIES = [
                { code: "PKR", name: "Pakistan - Pakistani Rupee (PKR)", value: "Pakistan (PKR)" },
                { code: "INR", name: "India - Indian Rupee (INR)", value: "India (INR)" },
                { code: "SAR", name: "Saudi Arabia - Saudi Riyal (SAR)", value: "Saudi Arabia (SAR)" },
                { code: "USD", name: "United States - US Dollar (USD)", value: "United States (USD)" },
                { code: "GBP", name: "United Kingdom - British Pound (GBP)", value: "United Kingdom (GBP)" },
                { code: "AED", name: "United Arab Emirates - UAE Dirham (AED)", value: "United Arab Emirates (AED)" }
            ];

            // ---------- Helper functions ----------
            const cleanSpeechText = (text) => {
                if (!text) return "";
                let cleaned = text.replace(/[\*_~`#]/g, "");
                cleaned = cleaned.replace(/^\s*[-*+•]\s*/gm, "");
                cleaned = cleaned.replace(/\s*[-*+•]\s*/g, ", ");
                cleaned = cleaned.replace(/[:;]/g, ".");
                return cleaned.trim();
            };

            const findBestVoiceForLanguage = (langCode, availableVoices) => {
                let matched = availableVoices.find(v => v.lang.split("-")[0].toLowerCase() === langCode);
                if (!matched && langCode === "ur") {
                    matched = availableVoices.find(v => v.lang.split("-")[0].toLowerCase() === "hi");
                }
                return matched || null;
            };

            // Speak with selected language voice
            const speakFeedback = (text) => {
                if (!text || typeof window === "undefined" || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(cleanSpeechText(text));
                const voice = findBestVoiceForLanguage(targetLanguageCode, voices);
                if (voice) {
                    utterance.voice = voice;
                    utterance.lang = voice.lang;
                } else {
                    const regionalCodes = {
                        ur: "ur-PK", hi: "hi-IN", en: "en-US",
                        ar: "ar-SA", es: "es-ES", fr: "fr-FR",
                        de: "de-DE", ja: "ja-JP"
                    };
                    utterance.lang = regionalCodes[targetLanguageCode] || targetLanguageCode;
                }
                utterance.rate = parseFloat(speechSpeed);
                window.speechSynthesis.speak(utterance);
            };

            // Speak always in English (for system messages)
            const speakEnglishFeedback = (text) => {
                if (!text || typeof window === "undefined" || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(cleanSpeechText(text));
                const englishVoice = voices.find(v => v.lang.toLowerCase().startsWith("en")) || null;
                if (englishVoice) {
                    utterance.voice = englishVoice;
                    utterance.lang = englishVoice.lang;
                } else {
                    utterance.lang = "en-US";
                }
                utterance.rate = parseFloat(speechSpeed);
                window.speechSynthesis.speak(utterance);
            };

            const stopSpeech = () => {
                if (typeof window !== "undefined" && window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
            };

            // ---------- Camera Functions ----------
            const stopCameraStream = () => {
                if (countdownIntervalRef.current) {
                    clearInterval(countdownIntervalRef.current);
                    countdownIntervalRef.current = null;
                }
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
                setIsCameraActive(false);
                setCountdown(null);
            };

            const startCamera = async () => {
                setErrorStatus(null);
                setImagePreview(null);
                setCurrentResult(null);
                stopSpeech();

                try {
                    speakEnglishFeedback("please hold your mobile taking picture");
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                    });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        videoRef.current.onloadedmetadata = () => {
                            videoRef.current?.play();
                        };
                    }
                    setIsCameraActive(true);

                    if (countdownIntervalRef.current) clearInterval(countdownIntervalRef.current);
                    let count = 3;
                    setCountdown(count);
                    countdownIntervalRef.current = setInterval(() => {
                        count--;
                        if (count > 0) {
                            setCountdown(count);
                        } else {
                            clearInterval(countdownIntervalRef.current);
                            countdownIntervalRef.current = null;
                            setCountdown(null);
                            if (streamRef.current === stream) {
                                capturePhotoAutomatic(stream);
                            }
                        }
                    }, 1000);

                } catch (err) {
                    console.error(err);
                    let errMsg = "Unable to access camera. Please check permissions or upload an image.";
                    if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                        errMsg = "Camera permissions denied. Please grant permission or use 'Upload Image'.";
                    }
                    setErrorStatus(errMsg);
                    speakEnglishFeedback("Camera access failed.");
                }
            };

            const capturePhotoAutomatic = (activeStream, retryCount = 0) => {
                if (!videoRef.current) {
                    stopCameraStream();
                    return;
                }
                if ((videoRef.current.readyState < 2 || videoRef.current.videoWidth === 0) && retryCount < 10) {
                    setTimeout(() => {
                        if (streamRef.current === activeStream) {
                            capturePhotoAutomatic(activeStream, retryCount + 1);
                        }
                    }, 150);
                    return;
                }

                try {
                    const canvas = document.createElement("canvas");
                    const maxDim = 800;
                    let width = videoRef.current.videoWidth || 640;
                    let height = videoRef.current.videoHeight || 480;
                    if (width > maxDim || height > maxDim) {
                        if (width > height) {
                            height = Math.round((height * maxDim) / width);
                            width = maxDim;
                        } else {
                            width = Math.round((width * maxDim) / height);
                            height = maxDim;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const context = canvas.getContext("2d");
                    if (context) {
                        context.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL("image/jpeg", 0.65);
                        setImagePreview(dataUrl);
                        activeStream.getTracks().forEach(track => track.stop());
                        if (streamRef.current === activeStream) streamRef.current = null;
                        setIsCameraActive(false);
                        analyzeCapturedImage(dataUrl, "image/jpeg");
                    }
                } catch (err) {
                    console.error(err);
                    setErrorStatus("Failed to capture image.");
                    stopCameraStream();
                }
            };

            const capturePhoto = () => {
                if (streamRef.current) {
                    capturePhotoAutomatic(streamRef.current);
                }
            };

            // ---------- File Upload ----------
            const handleFileChange = (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                setErrorStatus(null);
                stopCameraStream();
                setCurrentResult(null);
                stopSpeech();

                const file = files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target?.result;
                    if (dataUrl) {
                        setImagePreview(dataUrl);
                        analyzeCapturedImage(dataUrl, file.type);
                    }
                    e.target.value = "";
                };
                reader.onerror = () => {
                    setErrorStatus("Could not read the photo.");
                    e.target.value = "";
                };
                reader.readAsDataURL(file);
            };

            const triggerFileSelection = () => {
                if (fileInputRef.current) fileInputRef.current.click();
            };

            // ---------- Gemini API Call (Client-side) ----------
            const analyzeCapturedImage = async (base64Image, mimeType) => {
                setIsAnalyzing(true);
                setErrorStatus(null);
                speakEnglishFeedback("analysing please wait");

                // Get API Key from localStorage (or prompt if not set)
                let apiKey = localStorage.getItem("gemini_api_key");
                if (!apiKey) {
                    const userKey = prompt("Please enter your Gemini API Key:");
                    if (userKey && userKey.trim() !== "") {
                        apiKey = userKey.trim();
                        localStorage.setItem("gemini_api_key", apiKey);
                    } else {
                        setErrorStatus("No API Key provided. Please configure it via 'Configure API Key'.");
                        setIsAnalyzing(false);
                        return;
                    }
                }

                const matchedLang = LANGUAGES_SUPPORT.find(l => l.code === targetLanguageCode) || LANGUAGES_SUPPORT[0];
                const targetLanguageFull = matchedLang.label;

                // Prepare prompt
                let promptText = "";
                if (appMode === "cash") {
                    promptText = `You are a dedicated, precise visual cash reader assistant for blind and visually impaired individuals.
        You must ONLY identify cash/banknotes or coins belonging to "${cashCountry}". 
        CRITICAL RULES FOR CASH READER MODE:
        1. If the image contains a valid banknote or coin from "${cashCountry}", state its value and country clearly. Briefly mention its main color.
        2. If the image does NOT contain any cash from "${cashCountry}", you must NOT describe background objects. Instead, state exactly: "No cash or banknote from ${cashCountry} could be identified." or equivalent in the target language.
        3. Keep the translation exact.
        4. Do NOT output markdown asterisks, lists, hash tags, backticks or bullet symbols.
        5. Provide the entire response written in the selected language: "${targetLanguageFull}".`;
                } else {
                    promptText = `Provide a helpful, friendly, and structured description of this image in ${targetLanguageFull}.
        Since this is an accessible visual assistant for blind and visually impaired individuals, please fulfill the following guidelines:
        1. First, summarize the main scene in 1-2 sentences.
        2. Next, list and describe key objects, including their relative spacing or locations if relevant.
        3. Call out any readable text or signage explicitly.
        4. Point out potential safety considerations or hazards, if visible (e.g., steps, wet floor, sharp edges, obstacles, doorways).
        5. Keep the description direct, vivid, and helpful. Do not use markdown symbols like asterisks, hashes, underscores, backticks, or lists with bullets. Keep it as friendly natural language paragraph text.
        6. The entire output response MUST be written in the selected language: "${targetLanguageFull}".`;
                }

                // Clean base64
                let cleanBase64 = base64Image;
                let detectedMimeType = mimeType || "image/jpeg";
                if (base64Image.includes(";base64,")) {
                    const parts = base64Image.split(";base64,");
                    cleanBase64 = parts.pop() || "";
                    const mimePart = parts[0];
                    if (mimePart.startsWith("data:")) {
                        detectedMimeType = mimePart.substring(5);
                    }
                }

                try {
                    // Call Gemini API directly
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        {
                                            inlineData: {
                                                mimeType: detectedMimeType,
                                                data: cleanBase64
                                            }
                                        },
                                        { text: promptText }
                                    ]
                                }]
                            })
                        }
                    );

                    const data = await response.json();

                    if (!response.ok) {
                        const errorMsg = data.error?.message || "Gemini API error.";
                        if (response.status === 403 || response.status === 401) {
                            setErrorStatus("Invalid API Key. Please reconfigure your key.");
                            localStorage.removeItem("gemini_api_key");
                        } else {
                            setErrorStatus(errorMsg);
                        }
                        speakEnglishFeedback("Analysis failed.");
                        setIsAnalyzing(false);
                        return;
                    }

                    const descriptionText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No description generated.";
                    setCurrentResult({
                        description: descriptionText,
                        timestamp: new Date().toLocaleTimeString(),
                        imagePreviewUrl: base64Image
                    });
                    setIsAnalyzing(false);
                    speakFeedback(descriptionText);

                } catch (err) {
                    console.error(err);
                    setErrorStatus("Network error or invalid response.");
                    speakEnglishFeedback("Network error.");
                    setIsAnalyzing(false);
                }
            };

            // ---------- Configure API Key ----------
            const handleConfigureApiKey = () => {
                const currentKey = localStorage.getItem("gemini_api_key") || "";
                const newKey = prompt("Enter your Gemini API Key:", currentKey);
                if (newKey !== null) {
                    if (newKey.trim() === "") {
                        localStorage.removeItem("gemini_api_key");
                        speakEnglishFeedback("API Key removed.");
                    } else {
                        localStorage.setItem("gemini_api_key", newKey.trim());
                        speakEnglishFeedback("API Key configured successfully.");
                    }
                }
            };

            // ---------- Load voices ----------
            useEffect(() => {
                const loadVoices = () => {
                    if (typeof window !== "undefined" && window.speechSynthesis) {
                        const availableVoices = window.speechSynthesis.getVoices();
                        setVoices(availableVoices);
                    }
                };
                loadVoices();
                if (typeof window !== "undefined" && window.speechSynthesis) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
                return () => {
                    if (typeof window !== "undefined" && window.speechSynthesis) {
                        window.speechSynthesis.onvoiceschanged = null;
                    }
                };
            }, []);

            // ---------- Copy to clipboard ----------
            const copyToClipboard = () => {
                if (currentResult && currentResult.description) {
                    navigator.clipboard.writeText(currentResult.description);
                    speakEnglishFeedback("Result copied to clipboard.");
                }
            };

            // ---------- Render ----------
            return (
                <div className="w-full min-h-screen bg-black text-white flex flex-col font-sans overflow-x-hidden justify-between">

                    {/* Header */}
                    <header className="p-6 border-b border-zinc-800 bg-zinc-900 shadow-md animate-fade-in">
                        <div className="max-w-5xl mx-auto w-full flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <h1 className="text-3xl sm:text-4xl font-black tracking-wider text-yellow-400 uppercase">
                                    Tech for VI visual assistant
                                </h1>
                                <p className="text-zinc-200 mt-1 text-md sm:text-lg font-bold">
                                    Developed by Muhammad Hanzla
                                </p>
                            </div>
                            <div className="w-full sm:w-auto min-w-[280px] bg-zinc-950 border-4 border-yellow-400 p-4 rounded-2xl flex flex-col gap-2">
                                <label htmlFor="modeSelect" className="text-sm font-black text-zinc-300 uppercase tracking-wider block">
                                    Choose Mode
                                </label>
                                <select
                                    id="modeSelect"
                                    value={appMode}
                                    onChange={(e) => {
                                        const newMode = e.target.value;
                                        setAppMode(newMode);
                                        stopCameraStream();
                                        setCurrentResult(null);
                                        setImagePreview(null);
                                        speakEnglishFeedback(newMode === "cash" ? "Cash Reader selected." : "Visual Assistant selected.");
                                    }}
                                    className="w-full bg-zinc-900 border-2 border-zinc-700 text-yellow-400 font-extrabold text-lg p-2 rounded-xl focus:border-yellow-400 outline-none cursor-pointer"
                                >
                                    <option value="normal">Visual Assistant</option>
                                    <option value="cash">Cash Reader</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    {/* Main */}
                    <main className="flex-grow max-w-5xl w-full mx-auto p-4 sm:p-8 flex flex-col gap-8">

                        {currentView === "about" ? (
                            // About & Support View
                            <div className="bg-zinc-900 border-4 border-zinc-800 p-6 sm:p-10 rounded-3xl shadow-xl flex flex-col gap-8">
                                <div className="text-center space-y-2 border-b border-zinc-800 pb-6">
                                    <h2 className="text-4xl sm:text-5xl font-black text-yellow-400 uppercase tracking-wide">
                                        About & Support
                                    </h2>
                                    <p className="text-zinc-300 text-md sm:text-lg font-semibold">
                                        {aboutSubView === "whatsapp" ? "Select a WhatsApp group" : "Join our communities & support"}
                                    </p>
                                </div>

                                {aboutSubView === "menu" ? (
                                    <div className="flex flex-col gap-5">
                                        {/* Configure API Key Button */}
                                        <button
                                            onClick={handleConfigureApiKey}
                                            className="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-2xl sm:text-3xl py-6 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md border-4 border-yellow-300 cursor-pointer"
                                        >
                                            <span>🔑</span> Configure API Key
                                        </button>

                                        <button
                                            onClick={() => { setAboutSubView("whatsapp"); speakEnglishFeedback("Opening WhatsApp options"); }}
                                            className="w-full bg-[#25D366] hover:bg-[#20ba59] text-black font-black text-2xl sm:text-3xl py-6 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            Join WhatsApp Group
                                        </button>
                                        <button
                                            onClick={() => { speakEnglishFeedback("Opening Telegram"); window.open("https://t.me/TechForVI", "_blank"); }}
                                            className="w-full bg-[#0088cc] hover:bg-[#0077b3] text-white font-black text-2xl sm:text-3xl py-6 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            Join Telegram Channel
                                        </button>
                                        <button
                                            onClick={() => { speakEnglishFeedback("Opening YouTube"); window.open("https://youtube.com/@techforvi", "_blank"); }}
                                            className="w-full bg-[#FF0000] hover:bg-[#e60000] text-white font-black text-2xl sm:text-3xl py-6 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            Subscribe YouTube
                                        </button>
                                        <button
                                            onClick={() => { setCurrentView("main"); speakEnglishFeedback("Returning to main."); }}
                                            className="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-black text-2xl py-5 rounded-2xl active:scale-95 transition-all uppercase border-4 border-zinc-700 cursor-pointer"
                                        >
                                            Go Back
                                        </button>
                                    </div>
                                ) : (
                                    // WhatsApp sub-view
                                    <div className="flex flex-col gap-5">
                                        <button
                                            onClick={() => window.open("https://wa.me/923316809146?text=Hi!%20I%20would%20like%20to%20join%20the%20Tech%20For%20VI%20Male%20Group.", "_blank")}
                                            className="w-full bg-[#25D366] hover:bg-[#20ba59] text-black font-black text-xl sm:text-2xl py-5 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            JOIN TECH FOR V I FOR MALE group
                                        </button>
                                        <button
                                            onClick={() => window.open("https://wa.me/923316809146?text=Hi!%20I%20would%20like%20to%20join%20the%20Tech%20For%20VI%20Female%20Group.", "_blank")}
                                            className="w-full bg-[#25D366] hover:bg-[#20ba59] text-black font-black text-xl sm:text-2xl py-5 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            JOIN TECH FOR V I FOR FEMALE group
                                        </button>
                                        <button
                                            onClick={() => window.open("https://wa.me/923316809146?text=Hi!%20I%20would%20like%20to%20join%20the%20Tech%20For%20VI%20International%20Group.", "_blank")}
                                            className="w-full bg-[#25D366] hover:bg-[#20ba59] text-black font-black text-xl sm:text-2xl py-5 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            JOIN TECH FOR V I INTERNATIONAL ENGLISH TEXT ONLY group
                                        </button>
                                        <button
                                            onClick={() => window.open("https://wa.me/923316809146?text=Hi!%20I%20would%20like%20to%20join%20the%20Tech%20For%20VI%20Gaming%20Club.", "_blank")}
                                            className="w-full bg-[#25D366] hover:bg-[#20ba59] text-black font-black text-xl sm:text-2xl py-5 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            JOIN TECH FOR V I GAMING CLUB
                                        </button>
                                        <button
                                            onClick={() => window.open("https://whatsapp.com/channel/0029Vame1yJHltYFSMOiIn3u", "_blank")}
                                            className="w-full bg-[#25D366] hover:bg-[#20ba59] text-black font-black text-xl sm:text-2xl py-5 rounded-2xl flex items-center justify-center gap-4 active:scale-95 transition-all uppercase shadow-md cursor-pointer"
                                        >
                                            FOLLOW WHATSAPP CHANNEL
                                        </button>
                                        <button
                                            onClick={() => { setAboutSubView("menu"); speakEnglishFeedback("Returning to menu."); }}
                                            className="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-black text-2xl py-5 rounded-2xl active:scale-95 transition-all uppercase border-4 border-zinc-700 cursor-pointer"
                                        >
                                            Go Back
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            // Main View
                            <>
                                <div className={`grid gap-6 md:gap-8 ${appMode === "cash" ? "grid-cols-1" : "grid-cols-1 md:grid-cols-2"}`}>
                                    <button
                                        onClick={isCameraActive ? stopCameraStream : startCamera}
                                        className={`cursor-pointer bg-yellow-400 hover:bg-yellow-300 text-black font-black text-3xl sm:text-4xl py-12 rounded-3xl flex flex-col items-center justify-center gap-4 transition-all border-4 border-white shadow-[0_0_20px_rgba(255,255,255,0.1)] active:scale-95 min-h-[220px] focus-visible:outline focus-visible:outline-4 focus-visible:outline-yellow-400 ${countdown !== null ? "bg-orange-500 hover:bg-orange-400 text-white animate-pulse" : (isCameraActive ? "bg-red-600 hover:bg-red-500 text-white" : "")
                                            }`}
                                        aria-label={countdown !== null ? `Capturing in ${countdown}` : (isCameraActive ? "Stop Camera" : "Take Photo")}
                                    >
                                        <span className="text-6xl sm:text-8xl" role="img" aria-hidden="true">
                                            {countdown !== null ? "⏳" : "📸"}
                                        </span>
                                        <span className="uppercase tracking-wider">
                                            {countdown !== null ? `Capturing in ${countdown}...` : (isCameraActive ? "Stop Camera" : "Take Photo")}
                                        </span>
                                    </button>

                                    {appMode !== "cash" && (
                                        <button
                                            onClick={triggerFileSelection}
                                            className="bg-white hover:bg-zinc-100 text-black font-black text-3xl sm:text-4xl py-12 rounded-3xl flex flex-col items-center justify-center gap-4 cursor-pointer transition-all border-4 border-yellow-400 shadow-[0_0_20px_rgba(255,255,100,0.1)] active:scale-95 min-h-[220px]"
                                            aria-label="Upload Image"
                                        >
                                            <span className="text-6xl sm:text-8xl" role="img" aria-hidden="true">📂</span>
                                            <span className="uppercase tracking-wider">Upload Image</span>
                                        </button>
                                    )}
                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileChange} />
                                </div>

                                <button
                                    onClick={stopSpeech}
                                    className="w-full bg-red-600 hover:bg-red-500 text-white font-black text-3xl sm:text-4xl py-6 rounded-3xl border-4 border-white flex items-center justify-center gap-4 transition-all active:scale-95 shadow-xl cursor-pointer"
                                    aria-label="Stop Speech"
                                >
                                    <span>🔇</span>
                                    <span className="uppercase tracking-widest">Stop Speech</span>
                                </button>

                                <button
                                    onClick={copyToClipboard}
                                    disabled={!currentResult || isAnalyzing}
                                    className={`w-full font-black text-3xl sm:text-4xl py-6 rounded-3xl border-4 flex items-center justify-center gap-4 transition-all shadow-xl ${(!currentResult || isAnalyzing) ? "bg-zinc-800 text-zinc-500 border-zinc-700 cursor-not-allowed opacity-40" : "bg-teal-600 hover:bg-teal-500 text-white border-white cursor-pointer active:scale-95"
                                        }`}
                                    aria-label="Copy result to clipboard"
                                >
                                    <span>📋</span>
                                    <span className="uppercase tracking-widest">Copy result to clipboard</span>
                                </button>

                                {/* Settings */}
                                <div className={`grid grid-cols-1 ${appMode === "cash" ? "lg:grid-cols-3 md:grid-cols-2" : "md:grid-cols-2"} gap-6 md:gap-8 bg-zinc-900 border-4 border-zinc-800 p-6 md:p-8 rounded-3xl shadow-xl`}>
                                    <div className="space-y-3">
                                        <label htmlFor="langSelect" className="text-xl sm:text-2xl font-black text-yellow-400 uppercase flex items-center gap-2">
                                            <span>🌐</span> Choose Target Language
                                        </label>
                                        <select
                                            id="langSelect"
                                            value={targetLanguageCode}
                                            onChange={(e) => {
                                                const newCode = e.target.value;
                                                setTargetLanguageCode(newCode);
                                                const matched = LANGUAGES_SUPPORT.find(l => l.code === newCode);
                                                if (matched) speakEnglishFeedback(`Language updated to ${matched.name}.`);
                                            }}
                                            className="w-full bg-zinc-950 border-4 border-zinc-700 p-4 rounded-2xl text-xl md:text-2xl font-bold text-white focus:border-yellow-400 outline-none h-20 cursor-pointer"
                                        >
                                            {LANGUAGES_SUPPORT.map(lang => (
                                                <option key={lang.code} value={lang.code}>{lang.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="space-y-3">
                                        <label htmlFor="speedSelect" className="text-xl sm:text-2xl font-black text-yellow-400 uppercase flex items-center gap-2">
                                            <span>⚡</span> Select Speech Rate
                                        </label>
                                        <select
                                            id="speedSelect"
                                            value={speechSpeed}
                                            onChange={(e) => setSpeechSpeed(e.target.value)}
                                            className="w-full bg-zinc-950 border-4 border-zinc-700 p-4 rounded-2xl text-xl md:text-2xl font-bold text-white focus:border-yellow-400 outline-none h-20 cursor-pointer"
                                        >
                                            <option value="0.5">0.5x (Slow)</option>
                                            <option value="0.75">0.75x</option>
                                            <option value="1">1x (Normal)</option>
                                            <option value="1.25">1.25x</option>
                                            <option value="1.5">1.5x</option>
                                            <option value="1.75">1.75x</option>
                                            <option value="2">2x (Fast)</option>
                                        </select>
                                    </div>

                                    {appMode === "cash" && (
                                        <div className="space-y-3">
                                            <label htmlFor="cashCountrySelect" className="text-xl sm:text-2xl font-black text-yellow-400 uppercase flex items-center gap-2">
                                                <span>💵</span> Select Currency Country
                                            </label>
                                            <select
                                                id="cashCountrySelect"
                                                value={cashCountry}
                                                onChange={(e) => {
                                                    setCashCountry(e.target.value);
                                                    speakEnglishFeedback(`Currency country changed to ${e.target.value}.`);
                                                }}
                                                className="w-full bg-zinc-950 border-4 border-zinc-700 p-4 rounded-2xl text-xl md:text-2xl font-bold text-white focus:border-yellow-400 outline-none h-20 cursor-pointer"
                                            >
                                                {CASH_COUNTRIES.map(c => (
                                                    <option key={c.code} value={c.value}>{c.name}</option>
                                                ))}
                                            </select>
                                        </div>
                                    )}
                                </div>

                                {/* How to Use */}
                                <button
                                    onClick={() => { speakEnglishFeedback("Opening tutorial."); window.open("https://youtu.be/GYJkvj9_PUk?si=pgw9J2dMzhrokYZH", "_blank"); }}
                                    className="w-full bg-yellow-400 hover:bg-yellow-300 text-black font-extrabold text-2xl sm:text-3xl py-6 rounded-3xl border-4 border-white flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl cursor-pointer"
                                >
                                    <span>▶️</span> How to Use
                                </button>

                                {/* About & Support */}
                                <button
                                    onClick={() => { setCurrentView("about"); setAboutSubView("menu"); speakEnglishFeedback("About screen opened."); }}
                                    className="w-full bg-zinc-900 hover:bg-zinc-800 text-yellow-400 hover:text-yellow-300 font-extrabold text-2xl sm:text-3xl py-6 rounded-3xl border-4 border-zinc-800 flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl cursor-pointer"
                                >
                                    <span>❓</span> About & Support
                                </button>

                                {/* Camera Preview */}
                                {isCameraActive && (
                                    <section className="bg-zinc-900 border-4 border-yellow-400 rounded-3xl overflow-hidden p-6 flex flex-col gap-6 shadow-2xl">
                                        <div className="flex justify-between items-center border-b border-zinc-800 pb-3">
                                            <h2 className="text-xl font-bold text-yellow-400 flex items-center gap-2 uppercase tracking-wide">
                                                <span className="w-3.5 h-3.5 rounded-full bg-red-600 animate-ping"></span>
                                                Active Camera Viewfinder
                                            </h2>
                                            <button
                                                onClick={stopCameraStream}
                                                className="py-1.5 px-4 font-bold uppercase text-xs rounded-xl bg-red-950 text-red-200 border border-red-500 hover:bg-red-900 cursor-pointer"
                                            >
                                                Close
                                            </button>
                                        </div>
                                        <div className="relative aspect-video max-h-[440px] w-full rounded-2xl bg-black overflow-hidden border border-zinc-800">
                                            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
                                        </div>
                                        <button
                                            onClick={capturePhoto}
                                            className="w-full py-6 rounded-2xl bg-yellow-400 text-black font-black text-2xl hover:bg-yellow-300 transition-all border-4 border-white uppercase tracking-wider"
                                        >
                                            Take Snapshot
                                        </button>
                                    </section>
                                )}

                                {/* Error */}
                                {errorStatus && (
                                    <div className="bg-red-950 border-4 border-red-600 rounded-2xl p-6 flex items-start gap-4 shadow-xl" role="alert">
                                        <span className="text-3xl">⚠️</span>
                                        <div>
                                            <h2 className="font-extrabold text-red-400 text-xl uppercase">Error:</h2>
                                            <p className="text-zinc-100 text-md sm:text-lg mt-2 font-medium">{errorStatus}</p>
                                        </div>
                                    </div>
                                )}

                                {/* Analyzing */}
                                {isAnalyzing && (
                                    <div className="bg-zinc-900 border-4 border-dashed border-yellow-400/50 rounded-3xl p-10 flex flex-col items-center justify-center gap-6">
                                        <div className="h-12 flex items-end gap-2">
                                            <span className="sound-bar w-2 h-7 bg-yellow-400 rounded"></span>
                                            <span className="sound-bar w-2.5 h-12 bg-yellow-400 rounded"></span>
                                            <span className="sound-bar w-2 h-5 bg-yellow-400 rounded"></span>
                                            <span className="sound-bar w-2.5 h-10 bg-yellow-400 rounded"></span>
                                            <span className="sound-bar w-2 h-6 bg-yellow-400 rounded"></span>
                                        </div>
                                        <div className="text-center">
                                            <h2 className="text-2xl sm:text-3xl font-black text-yellow-400 uppercase animate-pulse">
                                                Analyzing image, please wait...
                                            </h2>
                                            <p className="text-zinc-400 text-md mt-2 font-medium">Sending to Gemini AI.</p>
                                        </div>
                                    </div>
                                )}

                                {/* Output */}
                                <section className="flex-grow bg-zinc-900 rounded-3xl border-4 border-zinc-800 p-6 sm:p-8 flex flex-col justify-between gap-6 min-h-[220px]">
                                    <div>
                                        <div className="flex justify-between items-center border-b border-zinc-800 pb-3 mb-4">
                                            <h2 className="text-lg font-black text-zinc-500 uppercase flex items-center gap-2">
                                                <span>🔊</span> Scene Description Output
                                            </h2>
                                            {currentResult && <span className="text-xs font-mono text-zinc-500">{currentResult.timestamp}</span>}
                                        </div>
                                        <div className="text-3xl sm:text-4xl leading-snug font-bold text-white">
                                            {currentResult ? (
                                                <p className="text-white">{currentResult.description}</p>
                                            ) : (
                                                <p className="text-zinc-500">System ready. Please take a photo or upload an image.</p>
                                            )}
                                        </div>
                                    </div>

                                    {currentResult && (
                                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 mt-6 pt-6 border-t border-zinc-800/80">
                                            {imagePreview && (
                                                <div className="flex items-center gap-3">
                                                    <div className="w-16 h-16 rounded-xl overflow-hidden border-2 border-zinc-700 bg-black shrink-0">
                                                        <img src={imagePreview} alt="Thumbnail" className="w-full h-full object-cover" />
                                                    </div>
                                                    <div>
                                                        <span className="text-xs uppercase text-zinc-500 block font-bold">Processed Frame</span>
                                                        <span className="text-sm text-zinc-300 font-semibold">Ready to read</span>
                                                    </div>
                                                </div>
                                            )}
                                            <div className="flex flex-wrap gap-3">
                                                <button
                                                    onClick={() => speakFeedback(currentResult.description)}
                                                    className="px-6 py-4 rounded-xl bg-yellow-400 text-black font-black text-lg hover:bg-yellow-300 flex items-center gap-2 cursor-pointer active:scale-95"
                                                >
                                                    🔄 Repeat Speech
                                                </button>
                                                <button
                                                    onClick={stopSpeech}
                                                    className="px-6 py-4 rounded-xl bg-red-950 border-2 border-red-500 text-red-200 hover:bg-red-900 font-bold text-lg flex items-center gap-2 cursor-pointer active:scale-95"
                                                >
                                                    🔇 Stop Speech
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </section>
                            </>
                        )}
                    </main>
                    <div className="py-2"></div>
                </div>
            );
        }

        // ============================================================
        //  RENDER APP
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons if needed (optional)
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
